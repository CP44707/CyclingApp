<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Menu</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .container {
            width: 90%;
            max-width: 400px;
        }
        button {
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            background-color: #007BFF;
            color: white;
        }
        button:active {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="selectOption('Cycling')">Cycling</button>
        <button onclick="selectOption('Receiving')">Receiving</button>
        <button onclick="selectOption('Picking')">Picking</button>
    </div>

    <script>
        function selectOption(option) {
            alert(option + " selected");
        }
    </script>
</body>
</html>
