<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Counter</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    background: rgb(0,0,0);
    color: rgb(255,224,0);
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
}

/* =========================
   TOP 40% PANEL
========================= */
#skuSection,
#scanSection {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;

    height: 40vh;
    padding: 8px;
    box-sizing: border-box;

    width: 100vw;
}

h2 {
    text-align: center;
    font-size: 20px;
    margin: 4px 0;
}

label {
    font-size: 16px;
}

/* INPUTS */
input, select {
    width: 100%;
    font-size: 20px;
    padding: 12px;
    margin: 4px 0;
    background: black;
    color: rgb(255,224,0);
    border: 2px solid rgb(255,224,0);
    border-radius: 6px;
    box-sizing: border-box;
}

input:focus, select:focus {
    outline: none;
    box-shadow: 0 0 8px rgb(255,224,0);
}

/* BUTTONS */
button {
    width: 100%;
    font-size: 20px;
    padding: 14px;
    margin: 4px 0;
    background: black;
    color: rgb(255,224,0);
    border: 2px solid rgb(255,224,0);
    border-radius: 8px;
    touch-action: manipulation;
}

button:active {
    background: rgb(255,224,0);
    color: black;
}

/* BUTTON STACK */
.topButtons {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 4px;
}

/* =========================
   BOTTOM 60% TABLE
========================= */
#resultTable {
    position: absolute;
    top: 40vh;
    left: 0;
    width: 100vw;
    height: 60vh;
    overflow-y: auto;
    display: block;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

td, th {
    border: 1px solid rgb(255,224,0);
    padding: 6px;
    text-align: center;
}

th {
    background: rgb(255,224,0);
    color: black;
    font-size: 14px;
}

/* =========================
   SKU SUGGESTIONS
========================= */
.suggestions {
    position: relative;
}

.suggestionBox {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: black;
    border: 2px solid rgb(255,224,0);
    max-height: 160px;
    overflow-y: auto;
    z-index: 999;
}

.suggestionItem {
    padding: 10px;
    font-size: 16px;
    border-bottom: 1px solid rgb(255,224,0);
}

.suggestionItem:active {
    background: rgb(255,224,0);
    color: black;
}

/* =========================
   ERROR
========================= */
#errorMsg {
    text-align: center;
    min-height: 20px;
    font-size: 16px;
}

/* =========================
   HIDE
========================= */
.hidden {
    display: none;
}
</style>
</head>

<body>

<h2>Scan Items</h2>

<!-- =========================
     SKU SECTION
========================= -->
<div id="skuSection">
    <label>Enter SKU:</label>

    <div class="suggestions">
        <input type="text" id="sku" autocomplete="off">
        <div id="suggestionBox" class="suggestionBox hidden"></div>
    </div>

    <button onclick="startScanning()">Start Scanning</button>
</div>

<!-- =========================
     SCAN SECTION
========================= -->
<div id="scanSection" class="hidden">

    <p><strong>SKU:</strong> <span id="skuDisplay"></span></p>

    <div class="topButtons">
        <button onclick="nextSKU()">Next SKU</button>
        <button onclick="completeBin()">Complete Bin</button>
        <button onclick="openManual()">Manual Add LOT</button>
    </div>

    <input type="text" id="scanInput" placeholder="Scan continuously..." autofocus>

    <div id="errorMsg"></div>
</div>

<!-- =========================
     RESULTS TABLE
========================= -->
<table id="resultTable" class="hidden">
    <thead>
        <tr>
            <th>SKU</th>
            <th>LOT</th>
            <th>EXP</th>
            <th>QTY</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

/* =========================
   GOOGLE SHEET SKU LOAD
========================= */
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcNmdR8CzUL7BKaZkdrUttj8u9z73q6ThlT2h_6c5ua_dtbb6D93O-80vFDR3OwS-OcdXH_2NWhikf/pub?output=csv";
let skuList = [];

async function loadSKUs() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();

        skuList = text
            .split("\n")
            .map(r => r.split(",")[0]?.trim())
            .filter(Boolean);

    } catch (e) {
        console.error("SKU load failed", e);
    }
}
loadSKUs();

/* =========================
   AUTOCOMPLETE
========================= */
const skuInput = document.getElementById("sku");
const suggestionBox = document.getElementById("suggestionBox");

skuInput.addEventListener("input", function () {
    const val = this.value.trim().toLowerCase();

    if (!val) {
        suggestionBox.classList.add("hidden");
        return;
    }

    const matches = skuList
        .filter(s => s.toLowerCase().includes(val))
        .slice(0, 10);

    if (!matches.length) {
        suggestionBox.classList.add("hidden");
        return;
    }

    suggestionBox.innerHTML = "";
    suggestionBox.classList.remove("hidden");

    matches.forEach(sku => {
        const div = document.createElement("div");
        div.className = "suggestionItem";
        div.innerText = sku;

        div.onclick = () => {
            skuInput.value = sku;
            suggestionBox.classList.add("hidden");
        };

        suggestionBox.appendChild(div);
    });
});

document.addEventListener("click", (e) => {
    if (!e.target.closest(".suggestions")) {
        suggestionBox.classList.add("hidden");
    }
});

/* =========================
   STATE
========================= */
const scanInput = document.getElementById('scanInput');
const tableBody = document.querySelector('#resultTable tbody');
const errorMsg = document.getElementById('errorMsg');

let dataStore = {};
let buffer = '';
let timer = null;
let lastInputTime = Date.now();

let currentSKU = "";

/* =========================
   START SCANNING
========================= */
function startScanning() {
    const sku = skuInput.value.trim();

    if (!sku) return alert("Enter SKU first");

    if (!skuList.includes(sku)) {
        alert("SKU not found in master list");
        return;
    }

    currentSKU = sku;

    document.getElementById('skuDisplay').innerText = sku;

    document.getElementById('skuSection').classList.add('hidden');
    document.getElementById('scanSection').classList.remove('hidden');
    document.getElementById('resultTable').classList.remove('hidden');

    scanInput.focus();
}

/* ENTER SUPPORT */
skuInput.addEventListener("keydown", e => {
    if (e.key === "Enter") startScanning();
});

/* =========================
   SCANNING ENGINE
========================= */
scanInput.addEventListener('input', function () {
    const now = Date.now();
    const diff = now - lastInputTime;
    lastInputTime = now;

    if (diff > 50) buffer = '';

    buffer += scanInput.value;
    scanInput.value = '';

    clearTimeout(timer);
    timer = setTimeout(() => {
        processScan(buffer);
        buffer = '';
    }, 50);
});

function showError(msg) {
    errorMsg.innerText = msg;
    setTimeout(() => errorMsg.innerText = '', 1500);
}

function processScan(raw) {
    if (!raw) return;

    const GS = String.fromCharCode(29);
    let working = raw;

    let exp = '';
    let lot = '';

    let expIndex = working.indexOf('17');
    if (expIndex !== -1 && working.length >= expIndex + 8) {
        const expRaw = working.substr(expIndex + 2, 6);
        exp = `20${expRaw.slice(0,2)}-${expRaw.slice(2,4)}-${expRaw.slice(4,6)}`;
    }

    let lotIndex = working.indexOf('10');
    if (lotIndex !== -1) {
        let i = lotIndex + 2;
        let value = '';

        while (i < working.length && working[i] !== GS) {
            value += working[i];
            i++;
        }

        lot = value;
    }

    if (!lot) {
        showError("Invalid barcode");
        return;
    }

    const key = currentSKU + "|" + lot + "|" + exp;

    if (!dataStore[key]) {
        dataStore[key] = { sku: currentSKU, lot, exp, qty: 0 };
    }

    dataStore[key].qty++;

    renderTable();
}

/* =========================
   TABLE
========================= */
function renderTable() {
    tableBody.innerHTML = '';

    Object.values(dataStore).forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${item.sku}</td>
            <td>${item.lot}</td>
            <td>${item.exp}</td>
            <td>${item.qty}</td>
        `;
        tableBody.appendChild(row);
    });
}

/* =========================
   PLACEHOLDERS
========================= */
function nextSKU() {}
function completeBin() {}
function openManual() {}

</script>

</body>
</html>
