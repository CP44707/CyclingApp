<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Counter</title>

<style>
body {
    font-family: Arial;
    background: rgb(0,0,0);
    color: rgb(255,224,0);
    margin: 0;
    padding: 0;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
}

/* =========================
   TOP 40% WORK AREA
========================= */
#topPanel {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 40vh;

    padding: 8px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    gap: 6px;
}

/* =========================
   BOTTOM TABLE
========================= */
#resultTable {
    position: fixed;
    top: 40vh;
    left: 0;
    right: 0;
    bottom: 0;
    overflow-y: auto;
}

/* TEXT */
h2 {
    text-align: center;
    font-size: 20px;
    margin: 4px 0;
}

/* INPUTS */
input {
    width: 100%;
    font-size: 20px;
    padding: 12px;
    background: black;
    color: rgb(255,224,0);
    border: 2px solid rgb(255,224,0);
    border-radius: 6px;
    box-sizing: border-box;
}

/* BUTTONS */
button {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    background: black;
    color: rgb(255,224,0);
    border: 2px solid rgb(255,224,0);
    border-radius: 8px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

td, th {
    border: 1px solid rgb(255,224,0);
    padding: 6px;
    text-align: center;
}

th {
    background: rgb(255,224,0);
    color: black;
}

/* AUTOCOMPLETE BOX */
.suggestionBox {
    position: absolute;
    background: black;
    border: 2px solid rgb(255,224,0);
    width: 100%;
    max-height: 160px;
    overflow-y: auto;
    z-index: 999;
}

.suggestionItem {
    padding: 10px;
    border-bottom: 1px solid rgb(255,224,0);
}

.hidden { display: none; }

/* ERROR */
#errorMsg {
    text-align: center;
    min-height: 20px;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="topPanel">

<h2>Scan Items</h2>

<!-- =========================
   SKU INPUT + GOOGLE FILTER
========================= -->
<div style="position:relative;">
    <input type="text" id="sku" placeholder="Enter SKU">
    <div id="suggestionBox" class="suggestionBox hidden"></div>
</div>

<button onclick="startScanning()">Start Scanning</button>

<div id="scanSection" class="hidden">

    <p><strong>SKU:</strong> <span id="skuDisplay"></span></p>

    <button onclick="nextSKU()">Next SKU</button>
    <button onclick="completeBin()">Complete Bin</button>
    <button onclick="openManual()">Manual Add LOT</button>

    <input type="text" id="scanInput" placeholder="Scan..." autofocus>

    <div id="errorMsg"></div>
</div>

</div>

<!-- =========================
   TABLE
========================= -->
<div id="resultTable" class="hidden">
    <table>
        <thead>
            <tr>
                <th>SKU</th>
                <th>LOT</th>
                <th>EXP</th>
                <th>QTY</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>

/* =========================
   GOOGLE SHEET SKU LOAD
========================= */
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcNmdR8CzUL7BKaZkdrUttj8u9z73q6ThlT2h_6c5ua_dtbb6D93O-80vFDR3OwS-OcdXH_2NWhikf/pub?output=csv";
let skuList = [];

async function loadSKUs() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();

        skuList = text
            .split("\n")
            .map(r => r.split(",")[0]?.trim())
            .filter(Boolean);

    } catch (e) {
        console.error("SKU load failed", e);
    }
}
loadSKUs();

/* =========================
   AUTOCOMPLETE (RESTORED)
========================= */
const skuInput = document.getElementById("sku");
const suggestionBox = document.getElementById("suggestionBox");

skuInput.addEventListener("input", function () {
    const val = this.value.toLowerCase().trim();

    if (!val) {
        suggestionBox.classList.add("hidden");
        return;
    }

    const matches = skuList
        .filter(s => s.toLowerCase().includes(val))
        .slice(0, 10);

    if (!matches.length) {
        suggestionBox.classList.add("hidden");
        return;
    }

    suggestionBox.innerHTML = "";
    suggestionBox.classList.remove("hidden");

    matches.forEach(sku => {
        const div = document.createElement("div");
        div.className = "suggestionItem";
        div.innerText = sku;

        div.onclick = () => {
            skuInput.value = sku;
            suggestionBox.classList.add("hidden");
        };

        suggestionBox.appendChild(div);
    });
});

document.addEventListener("click", e => {
    if (!e.target.closest("#topPanel")) {
        suggestionBox.classList.add("hidden");
    }
});

/* =========================
   STATE
========================= */
const scanInput = document.getElementById('scanInput');
const tableBody = document.querySelector('tbody');
const errorMsg = document.getElementById('errorMsg');

let dataStore = {};
let buffer = '';
let timer = null;
let lastInputTime = Date.now();
let currentSKU = "";

/* =========================
   START SCANNING (UNCHANGED LOGIC)
========================= */
function startScanning() {
    const sku = skuInput.value.trim();
    if (!sku) return alert("Enter SKU first");

    currentSKU = sku;

    document.getElementById('skuDisplay').innerText = sku;

    document.getElementById('scanSection').classList.remove('hidden');
    document.getElementById('resultTable').classList.remove('hidden');

    scanInput.focus();
}

/* =========================
   SCANNER ENGINE (UNCHANGED)
========================= */
scanInput.addEventListener('input', function () {
    const now = Date.now();
    const diff = now - lastInputTime;
    lastInputTime = now;

    if (diff > 50) buffer = '';

    buffer += scanInput.value;
    scanInput.value = '';

    clearTimeout(timer);
    timer = setTimeout(() => {
        processScan(buffer);
        buffer = '';
    }, 50);
});

/* ERROR */
function showError(message) {
    errorMsg.innerText = message;
    setTimeout(() => errorMsg.innerText = '', 1500);
}

/* =========================
   BARCODE LOGIC (UNCHANGED)
========================= */
function processScan(raw) {
    if (!raw) return;

    const GS = String.fromCharCode(29);
    let working = raw;

    let exp = '';
    let lot = '';

    if (working.startsWith('01') && working.length >= 16) {
        working = working.substr(16);
    }

    let expIndex = working.indexOf('17');
    if (expIndex !== -1 && working.length >= expIndex + 8) {
        const expRaw = working.substr(expIndex + 2, 6);
        exp = `20${expRaw.slice(0,2)}-${expRaw.slice(2,4)}-${expRaw.slice(4,6)}`;
        working = working.substring(0, expIndex) + working.substring(expIndex + 8);
    }

    let mfgIndex = working.indexOf('11');
    if (mfgIndex !== -1 && working.length >= mfgIndex + 8) {
        working = working.substring(0, mfgIndex) + working.substring(mfgIndex + 8);
    }

    let lotIndex = working.indexOf('10');
    if (lotIndex !== -1) {
        let i = lotIndex + 2;
        let value = '';

        while (i < working.length && working[i] !== GS) {
            value += working[i];
            i++;
        }

        lot = value;
    }

    if (!lot) {
        showError("Invalid barcode scanned");
        return;
    }

    const key = currentSKU + "|" + lot + "|" + exp;

    if (!dataStore[key]) {
        dataStore[key] = { sku: currentSKU, lot, exp, qty: 0 };
    }

    dataStore[key].qty++;

    renderTable();
}

/* TABLE */
function renderTable() {
    tableBody.innerHTML = '';

    Object.values(dataStore).forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${item.sku}</td>
            <td>${item.lot}</td>
            <td>${item.exp}</td>
            <td>${item.qty}</td>
        `;
        tableBody.appendChild(row);
    });
}

/* PLACEHOLDERS */
function nextSKU() {}
function completeBin() {}
function openManual() {}

</script>

</body>
</html>
