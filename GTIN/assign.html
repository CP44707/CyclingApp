<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Assign GTIN</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  input, select, button {
    width: 90%;
    font-size: 14px;
    padding: 8px;
    margin: 5px 0;
  }

  #status {
    font-size: 12px;
    margin-top: 5px;
    text-align: center;
  }

  .ok { color: lime; }
  .bad { color: red; }
</style>
</head>

<body>

<h4>Assign GTIN</h4>

<input id="search" placeholder="Search SKU..." />

<select id="skuSelect" size="4"></select>

<button id="assignBtn">Assign GTIN</button>

<div id="status"></div>

<script src="config.js"></script>

<script>
const search = document.getElementById("search");
const select = document.getElementById("skuSelect");
const status = document.getElementById("status");

const params = new URLSearchParams(window.location.search);
const gtin = params.get("gtin");

// --------------------
// BEEP
// --------------------
function beep(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 120);
}

// --------------------
// CLEAN
// --------------------
function clean(v) {
  return (v || "").toString().replace(/\r/g, "").trim();
}

// --------------------
// LOAD SKUs FROM CSV
// --------------------
let allSKUs = [];

async function loadSKUs() {
  const res = await fetch(CONFIG.CSV_URL + "&cache=" + Date.now());
  const text = await res.text();

  const lines = text.trim().split("\n");

  allSKUs = [];

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    const sku = clean(cols[0]);

    if (sku) allSKUs.push(sku);
  }

  renderList(allSKUs);
}

// --------------------
// RENDER DROPDOWN
// --------------------
function renderList(list) {
  select.innerHTML = "";

  list.forEach(sku => {
    const opt = document.createElement("option");
    opt.value = sku;
    opt.textContent = sku;
    select.appendChild(opt);
  });
}

// --------------------
// LIVE FILTER
// --------------------
search.addEventListener("input", () => {
  const q = search.value.toLowerCase();

  const filtered = allSKUs.filter(sku =>
    sku.toLowerCase().includes(q)
  );

  renderList(filtered);
});

// --------------------
// ASSIGN TO SHEET
// --------------------
document.getElementById("assignBtn").onclick = async () => {
  const sku = select.value;

  if (!sku) {
    status.textContent = "Select a SKU";
    status.className = "bad";
    beep(150);
    return;
  }

  status.textContent = "Assigning...";
  status.className = "";

  try {
    const res = await fetch(CONFIG.API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sku, gtin })
    });

    const result = await res.json();

    if (result.success) {
      status.textContent = "Assigned!";
      status.className = "ok";
      beep(880);

      setTimeout(() => {
        window.location.href = "scanner.html";
      }, 700);
    } else {
      status.textContent = result.error || "Failed";
      status.className = "bad";
      beep(150);
    }

  } catch (err) {
    status.textContent = "Network error";
    status.className = "bad";
    beep(150);
  }
};

loadSKUs();
</script>

</body>
</html>
