<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Assign GTIN</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #search {
    width: 90%;
    font-size: 14px;
    padding: 8px;
  }

  #results {
    width: 90%;
    max-height: 90px;
    overflow-y: auto;
    background: #1b1b1b;
    margin-top: 5px;
    border: 1px solid #333;
  }

  .item {
    padding: 6px;
    border-bottom: 1px solid #333;
    cursor: pointer;
  }

  .item:hover {
    background: #333;
  }

  #status {
    font-size: 12px;
    margin-top: 5px;
    text-align: center;
  }

  button {
    width: 90%;
    padding: 8px;
    margin-top: 5px;
    font-size: 14px;
  }

  .ok { color: lime; }
  .bad { color: red; }
</style>
</head>

<body>

<input id="search" placeholder="Search SKU..." />
<div id="results"></div>

<button id="assignBtn">Assign GTIN</button>

<div id="status"></div>

<script src="config.js"></script>

<script>
const search = document.getElementById("search");
const results = document.getElementById("results");
const status = document.getElementById("status");

const params = new URLSearchParams(window.location.search);
const gtin = params.get("gtin");

let allSKUs = [];
let selectedSKU = null;

// --------------------
// BEEP
// --------------------
function beep(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 120);
}

// --------------------
// LOAD CSV
// --------------------
async function loadSKUs() {
  const res = await fetch(CONFIG.CSV_URL + "&cache=" + Date.now());
  const text = await res.text();

  const lines = text.trim().split("\n");

  allSKUs = [];

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    const sku = (cols[0] || "").trim();
    if (sku) allSKUs.push(sku);
  }
}

loadSKUs();

// --------------------
// LIVE SEARCH (REAL UX)
// --------------------
search.addEventListener("input", () => {
  const q = search.value.toLowerCase();
  results.innerHTML = "";

  selectedSKU = null;

  if (!q) return;

  const matches = allSKUs
    .filter(sku => sku.toLowerCase().includes(q))
    .slice(0, 10); // limit results

  matches.forEach(sku => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = sku;

    div.onclick = () => {
      selectedSKU = sku;
      search.value = sku;
      results.innerHTML = "";

      status.textContent = "Selected: " + sku;
      status.className = "ok";
      beep(880);
    };

    results.appendChild(div);
  });
});

// --------------------
// ASSIGN
// --------------------
document.getElementById("assignBtn").onclick = async () => {
  if (!selectedSKU) {
    status.textContent = "Pick a SKU first";
    status.className = "bad";
    beep(150);
    return;
  }

  status.textContent = "Assigning...";
  status.className = "";

  try {
    const res = await fetch(CONFIG.API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        sku: selectedSKU,
        gtin: gtin
      })
    });

    const result = await res.json();

    if (result.success) {
      status.textContent = "Assigned!";
      status.className = "ok";
      beep(880);

      setTimeout(() => {
        window.location.href = "scanner.html";
      }, 700);
    } else {
      status.textContent = result.error || "Failed";
      status.className = "bad";
      beep(150);
    }

  } catch (e) {
    status.textContent = "Network error";
    status.className = "bad";
    beep(150);
  }
};
</script>

</body>
</html>
