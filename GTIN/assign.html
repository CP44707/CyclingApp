<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

<title>Assign GTIN</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    width: 3.75in;
    height: 2.25in;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #111;
    color: white;
  }

  input, button {
    width: 90%;
    padding: 10px;
    margin: 5px 0;
    font-size: 14px;
  }

  #msg {
    font-size: 12px;
    margin-top: 5px;
  }

  .error { color: #ff4d4d; }
  .ok { color: #4dff88; }
</style>
</head>

<body>

<h4>Assign GTIN</h4>

<input id="skuSearch" list="skuList" placeholder="Search SKU..." />
<datalist id="skuList"></datalist>

<button id="saveBtn">Assign GTIN</button>

<div id="msg"></div>

<script src="config.js"></script>
<script>
const msg = document.getElementById("msg");
const skuSearch = document.getElementById("skuSearch");
const skuList = document.getElementById("skuList");

const params = new URLSearchParams(window.location.search);
const gtin = params.get("gtin");

function beepGood() {
  const ctx = new AudioContext();
  const o = ctx.createOscillator();
  o.frequency.value = 880;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 120);
}

function beepBad() {
  const ctx = new AudioContext();
  const o = ctx.createOscillator();
  o.frequency.value = 180;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 400);
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split("\t");
  return lines.slice(1).map(line => {
    const cols = line.split("\t");
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (cols[i] || "").trim());
    return obj;
  });
}

async function loadSKUs() {
  const res = await fetch(CONFIG.CSV_URL);
  const text = await res.text();
  const data = parseCSV(text);

  data.forEach(r => {
    const opt = document.createElement("option");
    opt.value = r.Item;
    skuList.appendChild(opt);
  });
}

loadSKUs();

document.getElementById("saveBtn").onclick = async () => {
  const sku = skuSearch.value.trim();

  if (!sku) {
    msg.textContent = "Select a valid SKU";
    msg.className = "error";
    beepBad();
    return;
  }

  try {
    const res = await fetch(CONFIG.API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sku, gtin })
    });

    if (res.ok) {
      msg.textContent = "Assigned!";
      msg.className = "ok";
      beepGood();

      setTimeout(() => {
        window.location.href = "scanner.html";
      }, 800);
    } else {
      throw new Error();
    }

  } catch (e) {
    msg.textContent = "Save failed";
    msg.className = "error";
    beepBad();
  }
};
</script>

</body>
</html>
