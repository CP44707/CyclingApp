<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Assign GTIN</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  input, button {
    width: 90%;
    font-size: 14px;
    padding: 8px;
    margin: 5px 0;
  }

  #status {
    font-size: 12px;
    margin-top: 5px;
    text-align: center;
  }

  .ok { color: lime; }
  .bad { color: red; }
</style>
</head>

<body>

<h4>Assign GTIN</h4>

<input id="skuSearch" placeholder="Search SKU..." list="skuList" />
<datalist id="skuList"></datalist>

<button id="assignBtn">Assign</button>

<div id="status"></div>

<script src="config.js"></script>

<script>
const status = document.getElementById("status");
const skuSearch = document.getElementById("skuSearch");
const skuList = document.getElementById("skuList");

const params = new URLSearchParams(window.location.search);
const gtin = params.get("gtin");

// --------------------
// BEEP
// --------------------
function beep(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 120);
}

// --------------------
// CLEAN
// --------------------
function clean(v) {
  return (v || "").toString().replace(/\r/g, "").trim();
}

// --------------------
// LOAD SKU LIST FROM CSV
// --------------------
async function loadSKUs() {
  const res = await fetch(CONFIG.CSV_URL + "&cache=" + Date.now());
  const text = await res.text();

  const lines = text.trim().split("\n");

  skuList.innerHTML = "";

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    const sku = clean(cols[0]);

    if (!sku) continue;

    const opt = document.createElement("option");
    opt.value = sku;
    skuList.appendChild(opt);
  }
}

loadSKUs();

// --------------------
// ASSIGN GTIN TO SHEET
// --------------------
async function assign() {
  const sku = skuSearch.value.trim();

  if (!sku) {
    status.textContent = "Select a valid SKU";
    status.className = "bad";
    beep(150);
    return;
  }

  status.textContent = "Assigning...";
  status.className = "";

  try {
    const res = await fetch(CONFIG.API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        sku: sku,
        gtin: gtin
      })
    });

    if (res.ok) {
      status.textContent = "Assigned!";
      status.className = "ok";
      beep(880);

      setTimeout(() => {
        window.location.href = "scanner.html";
      }, 800);
    } else {
      throw new Error("Failed");
    }

  } catch (err) {
    status.textContent = "Error assigning";
    status.className = "bad";
    beep(150);
  }
}

document.getElementById("assignBtn").onclick = assign;

</script>

</body>
</html>
