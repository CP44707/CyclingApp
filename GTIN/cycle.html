<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cycle Submit</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input, select, button {
    width: 90%;
    font-size: 16px;
    padding: 8px;
    margin-top: 6px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  #status {
    font-size: 12px;
    margin-top: 6px;
    color: orange;
  }
</style>
</head>

<body>

<select id="warehouse">
  <option value="">Select Warehouse</option>
  <option value="AB">AB</option>
  <option value="ON">ON</option>
</select>

<input id="binInput" placeholder="Enter Bin" />

<button id="submitBtn">Submit Cycle Count</button>

<div id="status"></div>

<script src="config.js"></script>

<script>

const warehouse = document.getElementById("warehouse");
const binInput = document.getElementById("binInput");
const status = document.getElementById("status");

// --------------------
// BEEP
// --------------------
function beep(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 100);
}

// --------------------
// LOAD TABLE
// --------------------
let table = JSON.parse(localStorage.getItem("cycleTable") || "[]");

// --------------------
// SUBMIT ALL ROWS
// --------------------
document.getElementById("submitBtn").onclick = async () => {

  if (!warehouse.value) {
    status.textContent = "Select warehouse";
    beep(150);
    return;
  }

  if (!binInput.value.trim()) {
    status.textContent = "Enter bin";
    beep(150);
    return;
  }

  if (!table.length) {
    status.textContent = "No data in table";
    beep(150);
    return;
  }

  try {

    const requests = table.map(item => {

      return fetch(CONFIG.CYCLE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          cycle: "Cycle Count",
          warehouse: warehouse.value,
          bin: binInput.value.trim(),
          sku: item.sku,
          lot: item.lot,
          exp: item.exp,
          qty: item.qty
        })
      });

    });

    await Promise.all(requests);

    status.textContent = "Submitted";
    beep(880);

    // clear after successful submit
    localStorage.removeItem("cycleTable");

    setTimeout(() => {
      window.location.href = "scanner.html";
    }, 500);

  } catch (err) {
    status.textContent = "Error submitting";
    beep(150);
  }
};

</script>

</body>
</html>
