<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cycle Submit</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input, select, button {
    width: 90%;
    font-size: 16px;
    padding: 8px;
    margin-top: 6px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  #status {
    font-size: 12px;
    margin-top: 6px;
    color: orange;
  }
</style>
</head>

<body>

<select id="warehouse">
  <option value="">Select Warehouse</option>
  <option value="AB">AB</option>
  <option value="ON">ON</option>
</select>

<input id="binInput" placeholder="Enter Bin" />

<button id="submitBtn">Submit Cycle Count</button>

<div id="status"></div>

<script src="config.js"></script>

<script>

const warehouse = document.getElementById("warehouse");
const binInput = document.getElementById("binInput");
const status = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");

// --------------------
// BEEP
// --------------------
function beep(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 100);
}

// --------------------
// DATE FORMAT (UPDATED FOR YYMMDD)
// --------------------
function formatDate(input) {
  if (!input) return "";

  const s = String(input).trim();

  // expects yymmdd (e.g. 270123)
  if (s.length === 6 && /^\d+$/.test(s)) {
    const yy = s.slice(0, 2);
    const mm = s.slice(2, 4);
    const dd = s.slice(4, 6);

    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    return `${dd}-${months[Number(mm) - 1]}-${yy}`;
  }

  return input;
}

// --------------------
// LOAD TABLE
// --------------------
let table = JSON.parse(localStorage.getItem("cycleTable") || "[]");

// --------------------
// SUBMIT ALL ROWS
// --------------------
submitBtn.onclick = async () => {

  if (!warehouse.value) {
    status.textContent = "Select warehouse";
    beep(150);
    return;
  }

  if (!binInput.value.trim()) {
    status.textContent = "Enter bin";
    beep(150);
    return;
  }

  if (!table.length) {
    status.textContent = "No data in table";
    beep(150);
    return;
  }

  try {

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    status.textContent = `Submitting ${table.length} rows...`;

    // submit rows one at a time
    for (const item of table) {

      const response = await fetch(CONFIG.CYCLE_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          cycle: "Cycle Count",
          warehouse: warehouse.value,
          bin: binInput.value.trim(),
          sku: item.sku,
          lot: item.lot,
          exp: formatDate(item.exp),
          qty: item.qty
        })
      });

      if (!response.ok) {
        throw new Error("Upload failed");
      }
    }

    status.textContent = "Submitted";
    beep(880);

    localStorage.removeItem("cycleTable");

    setTimeout(() => {
      window.location.href = "scanner.html";
    }, 1000);

  } catch (err) {

    console.error(err);

    status.textContent = "Error submitting";
    beep(150);

    submitBtn.disabled = false;
    submitBtn.textContent = "Submit Cycle Count";
  }
};

</script>

</body>
</html>
