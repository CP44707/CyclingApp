<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cycle Count</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input, button, select {
    width: 90%;
    font-size: 16px;
    padding: 8px;
    margin-top: 4px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  #status {
    font-size: 12px;
    margin-top: 6px;
    color: orange;
  }
</style>
</head>

<body>

<input id="scanInput" placeholder="Scan SKU / Barcode..." autofocus />

<select id="warehouse">
  <option value="">Select Warehouse</option>
  <option value="AB">AB</option>
  <option value="ON">ON</option>
</select>

<input id="binInput" placeholder="Enter Bin" />

<input id="lotInput" placeholder="Lot" />
<input id="expInput" placeholder="Expiration (YYMMDD)" />
<input id="qtyInput" type="number" value="1" min="1" />

<button id="submitBtn">Submit Cycle Count</button>

<div id="status"></div>

<script src="config.js"></script>

<script>
const scanInput = document.getElementById("scanInput");
const warehouse = document.getElementById("warehouse");
const binInput = document.getElementById("binInput");
const lotInput = document.getElementById("lotInput");
const expInput = document.getElementById("expInput");
const qtyInput = document.getElementById("qtyInput");
const status = document.getElementById("status");

// --------------------
// BEEP
// --------------------
function beep(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 100);
}

// --------------------
// SCAN (simple passthrough)
// --------------------
scanInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    lotInput.focus();
    beep(880);
  }
});

// --------------------
// SUBMIT TO SHEET
// --------------------
document.getElementById("submitBtn").onclick = async () => {

  const payload = {
    cycle: "Cycle Count",
    warehouse: warehouse.value,
    bin: binInput.value.trim(),
    sku: scanInput.value.trim(),
    lot: lotInput.value.trim(),
    exp: expInput.value.trim(),
    qty: parseInt(qtyInput.value || "0", 10)
  };

  if (!payload.warehouse) {
    status.textContent = "Select warehouse";
    beep(150);
    return;
  }

  if (!payload.bin) {
    status.textContent = "Enter bin";
    beep(150);
    return;
  }

  if (!payload.sku) {
    status.textContent = "Scan SKU";
    beep(150);
    return;
  }

  try {

    const res = await fetch(CONFIG.CYCLE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const json = await res.json();

    if (json.status === "ok") {

      status.textContent = "Saved";
      beep(880);

      scanInput.value = "";
      lotInput.value = "";
      expInput.value = "";
      qtyInput.value = "1";

      scanInput.focus();
    } else {
      throw new Error(json.message);
    }

  } catch (err) {
    status.textContent = "Error saving";
    beep(150);
  }
};
</script>

</body>
</html>
