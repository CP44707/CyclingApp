<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Manual Entry</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #search {
    width: 90%;
    font-size: 14px;
    padding: 8px;
  }

  #results {
    width: 90%;
    max-height: 90px;
    overflow-y: auto;
    background: #1b1b1b;
    border: 1px solid #333;
    margin-top: 5px;
  }

  .item {
    padding: 6px;
    border-bottom: 1px solid #333;
    cursor: pointer;
  }

  .item:hover {
    background: #333;
  }

  input, button {
    width: 90%;
    font-size: 14px;
    padding: 8px;
    margin-top: 5px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  table {
    width: 95%;
    font-size: 12px;
    border-collapse: collapse;
    margin-top: 6px;
  }

  td, th {
    border-bottom: 1px solid #444;
    padding: 4px;
    text-align: center;
  }

  #lot, #exp, #qty, #addBtn {
    display: none;
  }
</style>
</head>

<body>

<!-- SKU SEARCH (EXACT ASSIGN STYLE) -->
<input id="search" placeholder="Search SKU..." />
<div id="results"></div>

<!-- STEP INPUTS -->
<input id="lot" placeholder="LOT" />
<input id="exp" placeholder="EXP (optional)" />
<input id="qty" type="number" value="1" min="1" />

<button id="addBtn">Add</button>
<button id="sendBtn">Send to Scanner</button>

<table>
  <thead>
    <tr>
      <th>LOT</th>
      <th>EXP</th>
      <th>QTY</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script src="config.js"></script>

<script>
// ========================
// STATE
// ========================
let allSKUs = [];
let selectedSKU = null;
let entries = [];

// ========================
// BEEP
// ========================
function beep(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 100);
}

// ========================
// LOAD CSV (Item column = SKU)
// ========================
async function loadSKUs() {
  const cacheBuster = localStorage.getItem("skuMapUpdatedAt") || Date.now();

  const res = await fetch(CONFIG.CSV_URL + "&cache=" + cacheBuster);
  const text = await res.text();

  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");
  const itemIndex = headers.indexOf("Item");

  allSKUs = [];

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    const sku = (cols[itemIndex] || "").trim();
    if (sku) allSKUs.push(sku);
  }
}

loadSKUs();

// ========================
// SKU SEARCH (YOUR EXACT STYLE)
// ========================
const search = document.getElementById("search");
const results = document.getElementById("results");

search.addEventListener("input", () => {
  const q = search.value.toLowerCase();
  results.innerHTML = "";
  selectedSKU = null;

  if (!q) return;

  const matches = allSKUs
    .filter(s => s.toLowerCase().includes(q))
    .slice(0, 10);

  matches.forEach(sku => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = sku;

    div.onclick = () => {
      selectedSKU = sku;
      search.value = sku;
      results.innerHTML = "";
      beep(880);

      document.getElementById("lot").style.display = "block";
    };

    results.appendChild(div);
  });
});

// ========================
// STEP FLOW
// ========================
const lot = document.getElementById("lot");
const exp = document.getElementById("exp");
const qty = document.getElementById("qty");

lot.addEventListener("change", () => {
  exp.style.display = "block";
});

exp.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    qty.style.display = "block";
    document.getElementById("addBtn").style.display = "block";
  }
});

// ========================
// ADD ITEM
// ========================
document.getElementById("addBtn").onclick = () => {
  if (!selectedSKU) return;

  const lotVal = lot.value.trim();
  const expVal = exp.value.trim();
  const qtyVal = parseInt(qty.value || "1");

  const key = `${lotVal}_${expVal}`;

  const existing = entries.find(e => e.key === key);

  if (existing) {
    existing.qty += qtyVal;
  } else {
    entries.push({
      key,
      sku: selectedSKU,
      lot: lotVal,
      exp: expVal,
      qty: qtyVal
    });
  }

  render();

  lot.value = "";
  exp.value = "";
  qty.value = "1";

  exp.style.display = "none";
  qty.style.display = "none";
  document.getElementById("addBtn").style.display = "none";

  lot.style.display = "block";
};

// ========================
// TABLE
// ========================
function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  entries.forEach(e => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${e.lot}</td>
      <td>${e.exp}</td>
      <td>${e.qty}</td>
    `;

    tbody.appendChild(row);
  });
}

// ========================
// SEND BACK
// ========================
document.getElementById("sendBtn").onclick = () => {
  localStorage.setItem("lotExpReturn", JSON.stringify({
    sku: selectedSKU,
    entries
  }));

  window.location.href = "scanner.html";
};

</script>

</body>
</html>
