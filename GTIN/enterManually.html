<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Manual Entry</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #search {
    width: 90%;
    font-size: 14px;
    padding: 8px;
  }

  #results {
    width: 90%;
    max-height: 90px;
    overflow-y: auto;
    background: #1b1b1b;
    border: 1px solid #333;
    margin-top: 5px;
  }

  .item {
    padding: 6px;
    border-bottom: 1px solid #333;
    cursor: pointer;
  }

  .item:hover {
    background: #333;
  }

  button, select, input {
    width: 90%;
    font-size: 14px;
    padding: 8px;
    margin-top: 5px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  table {
    width: 95%;
    font-size: 12px;
    border-collapse: collapse;
    margin-top: 6px;
  }

  td, th {
    border-bottom: 1px solid #444;
    padding: 4px;
    text-align: center;
  }

  tr:hover {
    background: #222;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  .modalContent {
    width: 90%;
    background: #1b1b1b;
    padding: 10px;
    border: 1px solid #333;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
</style>
</head>

<body>

<input id="search" placeholder="Search SKU..." />
<div id="results"></div>

<button id="sendBtn">Send to Scanner</button>

<table>
  <thead>
    <tr>
      <th>LOT</th>
      <th>EXP</th>
      <th>QTY</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<!-- LOT MODAL -->
<div class="modal" id="lotModal">
  <div class="modalContent">
    <input id="lotInput" placeholder="Enter LOT" />
    <button id="lotNext">Next</button>
  </div>
</div>

<!-- EXP MODAL -->
<div class="modal" id="expModal">
  <div class="modalContent">

    <button id="noExpBtn">No Expiry</button>

    <select id="yearSelect"></select>
    <select id="monthSelect"></select>
    <select id="daySelect"></select>

    <button id="expNext">Next</button>
  </div>
</div>

<!-- QTY MODAL -->
<div class="modal" id="qtyModal">
  <div class="modalContent">
    <input id="qtyInput" type="number" min="1" value="1" />
    <button id="qtyAdd">Add</button>
  </div>
</div>

<script src="config.js"></script>

<script>
// ========================
// STATE
// ========================
let allSKUs = [];
let selectedSKU = null;
let entries = [];

let currentLot = "";
let currentExp = "";

// ========================
// BEEP
// ========================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq) {
  const o = audioCtx.createOscillator();
  o.frequency.value = freq;
  o.connect(audioCtx.destination);
  o.start();
  setTimeout(() => o.stop(), 100);
}

// ========================
// FORMAT EXP
// ========================
function formatExp(exp) {
  if (!exp || exp.length !== 6) return exp;

  const year = "20" + exp.slice(0,2);
  const month = parseInt(exp.slice(2,4), 10) - 1;
  const day = exp.slice(4,6);

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  return `${day}-${months[month]}-${year.slice(2)}`;
}

// ========================
// LOAD CSV
// ========================
async function loadSKUs() {
  const cacheBuster = localStorage.getItem("skuMapUpdatedAt") || Date.now();

  const res = await fetch(CONFIG.CSV_URL + "&cache=" + cacheBuster);
  const text = await res.text();

  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");
  const itemIndex = headers.indexOf("Item");

  allSKUs = [];

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    const sku = (cols[itemIndex] || "").trim();

    if (sku) allSKUs.push(sku);
  }
}

loadSKUs();

// ========================
// SKU SEARCH
// ========================
const search = document.getElementById("search");
const results = document.getElementById("results");

search.addEventListener("input", () => {

  const q = search.value.toLowerCase();

  results.innerHTML = "";
  selectedSKU = null;

  if (!q) return;

  const matches = allSKUs
    .filter(s => s.toLowerCase().includes(q))
    .slice(0, 10);

  matches.forEach(sku => {

    const div = document.createElement("div");

    div.className = "item";
    div.textContent = sku;

    div.onclick = () => {

      selectedSKU = sku;

      search.value = sku;

      results.innerHTML = "";

      beep(880);

      document.getElementById("lotModal").style.display = "flex";

      document.getElementById("lotInput").focus();
    };

    results.appendChild(div);
  });
});

// ========================
// LOT FLOW
// ========================
document.getElementById("lotNext").onclick = () => {

  currentLot = document.getElementById("lotInput").value.trim();

  if (!currentLot) return;

  document.getElementById("lotModal").style.display = "none";
  document.getElementById("expModal").style.display = "flex";
};

// ========================
// EXP DROPDOWNS
// ========================
const yearSelect = document.getElementById("yearSelect");
const monthSelect = document.getElementById("monthSelect");
const daySelect = document.getElementById("daySelect");

for (let y = 2024; y <= 2045; y++) {
  const opt = document.createElement("option");
  opt.value = String(y).slice(2);
  opt.textContent = y;
  yearSelect.appendChild(opt);
}

for (let m = 1; m <= 12; m++) {
  const opt = document.createElement("option");
  opt.value = String(m).padStart(2, "0");
  opt.textContent = String(m).padStart(2, "0");
  monthSelect.appendChild(opt);
}

for (let d = 1; d <= 31; d++) {
  const opt = document.createElement("option");
  opt.value = String(d).padStart(2, "0");
  opt.textContent = String(d).padStart(2, "0");
  daySelect.appendChild(opt);
}

// ========================
// NO EXP
// ========================
document.getElementById("noExpBtn").onclick = () => {

  currentExp = "";

  document.getElementById("expModal").style.display = "none";
  document.getElementById("qtyModal").style.display = "flex";
};

// ========================
// EXP NEXT
// ========================
document.getElementById("expNext").onclick = () => {

  currentExp =
    yearSelect.value +
    monthSelect.value +
    daySelect.value;

  document.getElementById("expModal").style.display = "none";
  document.getElementById("qtyModal").style.display = "flex";
};

// ========================
// ADD ENTRY
// ========================
document.getElementById("qtyAdd").onclick = () => {

  const qty = parseInt(document.getElementById("qtyInput").value || "1");

  const key = currentLot + "_" + currentExp;

  const existing = entries.find(e => e.key === key);

  if (existing) {
    existing.qty += qty;
  } else {
    entries.push({
      key,
      sku: selectedSKU,
      lot: currentLot,
      exp: currentExp,
      qty
    });
  }

  render();

  beep(880);

  document.getElementById("qtyModal").style.display = "none";

  document.getElementById("lotInput").value = "";
  document.getElementById("qtyInput").value = "1";
};

// ========================
// TABLE
// ========================
function render() {

  const tbody = document.getElementById("tbody");

  tbody.innerHTML = "";

  entries.forEach(e => {

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${e.lot}</td>
      <td>${formatExp(e.exp)}</td>
      <td>${e.qty}</td>
    `;

    tbody.appendChild(row);
  });
}

// ========================
// SEND BACK
// ========================
document.getElementById("sendBtn").onclick = () => {

  localStorage.setItem("lotExpReturn", JSON.stringify({
    sku: selectedSKU,
    entries
  }));

  window.location.href = "scanner.html";
};
</script>

</body>
</html>
