<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Manual Entry</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input, select, button {
    width: 90%;
    font-size: 14px;
    padding: 8px;
    margin-top: 4px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  #suggestions {
    width: 90%;
    background: #222;
    max-height: 90px;
    overflow-y: auto;
    font-size: 12px;
  }

  .suggestion {
    padding: 5px;
    border-bottom: 1px solid #333;
    cursor: pointer;
  }

  .suggestion:hover {
    background: #444;
  }

  table {
    width: 95%;
    font-size: 12px;
    border-collapse: collapse;
    margin-top: 6px;
  }

  td, th {
    border-bottom: 1px solid #444;
    padding: 4px;
    text-align: center;
  }
</style>
</head>

<body>

<!-- STEP 1: SKU -->
<input id="skuInput" placeholder="Search SKU..." />
<div id="suggestions"></div>

<!-- STEP 2: LOT -->
<input id="lotInput" placeholder="Enter LOT" style="display:none;" />

<!-- STEP 3: EXP -->
<div id="expBox" style="display:none;">
  <select id="year"></select>
  <select id="month"></select>
  <select id="day"></select>
  <button id="skipExp">Skip Exp</button>
</div>

<!-- STEP 4: QTY -->
<input id="qtyInput" type="number" value="1" min="1" style="display:none;" />

<button id="addBtn" style="display:none;">Add Item</button>

<table>
  <thead>
    <tr>
      <th>LOT</th>
      <th>EXP</th>
      <th>QTY</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<button id="sendBtn">Send to Scanner</button>

<script src="config.js"></script>

<script>
// ========================
// STATE
// ========================
let skuMap = {};
let selectedSKU = null;
let entries = [];
let current = {};

// ========================
// LOAD SKU LIST
// ========================
async function loadCSV() {
  const res = await fetch(CONFIG.CSV_URL + "?t=" + Date.now(), { cache: "no-store" });
  const text = await res.text();

  skuMap = {};

  text.split("\n").slice(1).forEach(line => {
    const sku = line.split(",")[0]?.trim();
    if (sku) skuMap[sku] = true;
  });
}

// ========================
// SKU SEARCH
// ========================
const skuInput = document.getElementById("skuInput");
const suggestions = document.getElementById("suggestions");

skuInput.addEventListener("input", () => {
  const val = skuInput.value.toUpperCase();
  suggestions.innerHTML = "";

  if (!val) return;

  Object.keys(skuMap)
    .filter(sku => sku.includes(val))
    .slice(0, 6)
    .forEach(sku => {
      const div = document.createElement("div");
      div.className = "suggestion";
      div.textContent = sku;

      div.onclick = () => {
        selectedSKU = sku;
        skuInput.value = sku;
        suggestions.innerHTML = "";

        document.getElementById("lotInput").style.display = "block";
      };

      suggestions.appendChild(div);
    });
});

// ========================
// LOT STEP
// ========================
document.getElementById("lotInput").addEventListener("change", (e) => {
  current.lot = e.target.value.trim();
  document.getElementById("expBox").style.display = "block";
});

// ========================
// EXP SETUP
// ========================
const y = document.getElementById("year");
const m = document.getElementById("month");
const d = document.getElementById("day");

function initDates() {
  const now = new Date();

  for (let i = now.getFullYear(); i <= now.getFullYear() + 10; i++) {
    y.innerHTML += `<option value="${i}">${i}</option>`;
  }

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  months.forEach((mm, i) => {
    m.innerHTML += `<option value="${i+1}">${mm}</option>`;
  });

  for (let i = 1; i <= 31; i++) {
    d.innerHTML += `<option value="${i}">${i}</option>`;
  }
}

// skip exp
document.getElementById("skipExp").onclick = () => {
  current.exp = "";
  showQty();
};

// when exp selected
y.onchange = m.onchange = d.onchange = () => {
  if (y.value && m.value && d.value) {
    current.exp = `${y.value}-${m.value}-${d.value}`;
    showQty();
  }
};

// ========================
// QTY STEP
// ========================
function showQty() {
  document.getElementById("qtyInput").style.display = "block";
  document.getElementById("addBtn").style.display = "block";
}

// ========================
// ADD ITEM
// ========================
document.getElementById("addBtn").onclick = () => {
  const qty = parseInt(document.getElementById("qtyInput").value || "1");

  const existing = entries.find(e =>
    e.lot === current.lot && e.exp === current.exp
  );

  if (existing) {
    existing.qty += qty;
  } else {
    entries.push({
      sku: selectedSKU,
      lot: current.lot,
      exp: current.exp || "",
      qty
    });
  }

  render();

  // reset lot/exp/qty only
  document.getElementById("lotInput").value = "";
  document.getElementById("qtyInput").value = "1";
  document.getElementById("expBox").style.display = "none";
  document.getElementById("qtyInput").style.display = "none";
  document.getElementById("addBtn").style.display = "none";
  current = {};
};

// ========================
// TABLE
// ========================
function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  entries.forEach(e => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${e.lot}</td>
      <td>${e.exp}</td>
      <td>${e.qty}</td>
    `;

    tbody.appendChild(row);
  });
}

// ========================
// SEND BACK TO SCANNER
// ========================
document.getElementById("sendBtn").onclick = () => {
  localStorage.setItem("lotExpReturn", JSON.stringify({
    sku: selectedSKU,
    entries
  }));

  window.location.href = "scanner.html";
};

// ========================
// INIT
// ========================
loadCSV();
initDates();

</script>

</body>
</html>
