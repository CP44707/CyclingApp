<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Manual Entry</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input, button {
    width: 90%;
    font-size: 14px;
    padding: 8px;
    margin-top: 4px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  #suggestions {
    width: 90%;
    background: #222;
    max-height: 90px;
    overflow-y: auto;
    font-size: 12px;
  }

  .sug {
    padding: 5px;
    border-bottom: 1px solid #333;
    cursor: pointer;
  }

  .sug:hover {
    background: #444;
  }

  table {
    width: 95%;
    font-size: 12px;
    border-collapse: collapse;
    margin-top: 6px;
  }

  td, th {
    border-bottom: 1px solid #444;
    padding: 4px;
    text-align: center;
  }
</style>
</head>

<body>

<!-- SKU SEARCH -->
<input id="skuSearch" placeholder="Search SKU..." />
<div id="suggestions"></div>

<!-- SIMPLE INPUTS -->
<input id="lotInput" placeholder="LOT" />
<input id="expInput" placeholder="EXP (optional)" />
<input id="qtyInput" type="number" value="1" min="1" />

<button id="addBtn">Add</button>
<button id="sendBtn">Send to Scanner</button>

<table>
  <thead>
    <tr>
      <th>LOT</th>
      <th>EXP</th>
      <th>QTY</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script src="config.js"></script>

<script>
// ========================
// STATE
// ========================
let skuMap = {};
let selectedSKU = null;
let entries = [];

// ========================
// LOAD CSV (same source as scanner)
// ========================
async function loadCSV() {
  const res = await fetch(CONFIG.CSV_URL + "?t=" + Date.now(), { cache: "no-store" });
  const text = await res.text();

  skuMap = {};

  text.split("\n").slice(1).forEach(line => {
    const sku = line.split(",")[0]?.trim();
    const gtin = line.split(",")[1]?.replace(/\D/g, "").slice(-14);

    if (sku && gtin) {
      skuMap[sku] = gtin; // same dataset scanner uses indirectly
    }
  });
}

// ========================
// SKU SEARCH + SUGGESTIONS
// ========================
const skuSearch = document.getElementById("skuSearch");
const suggestions = document.getElementById("suggestions");

skuSearch.addEventListener("input", () => {
  const val = skuSearch.value.toUpperCase();
  suggestions.innerHTML = "";

  if (!val) return;

  Object.keys(skuMap)
    .filter(sku => sku.includes(val))
    .slice(0, 8)
    .forEach(sku => {
      const div = document.createElement("div");
      div.className = "sug";
      div.textContent = sku;

      div.onclick = () => {
        selectedSKU = sku;
        skuSearch.value = sku;
        suggestions.innerHTML = "";
      };

      suggestions.appendChild(div);
    });
});

// ========================
// ADD ROW
// ========================
document.getElementById("addBtn").onclick = () => {
  if (!selectedSKU) {
    alert("Select a SKU first");
    return;
  }

  const lot = document.getElementById("lotInput").value.trim();
  const exp = document.getElementById("expInput").value.trim();
  const qty = parseInt(document.getElementById("qtyInput").value || "1");

  if (!lot) {
    alert("LOT required");
    return;
  }

  const existing = entries.find(e =>
    e.lot === lot && e.exp === exp
  );

  if (existing) {
    existing.qty += qty;
  } else {
    entries.push({ sku: selectedSKU, lot, exp, qty });
  }

  render();

  document.getElementById("lotInput").value = "";
  document.getElementById("expInput").value = "";
  document.getElementById("qtyInput").value = "1";
};

// ========================
// TABLE
// ========================
function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  entries.forEach(e => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${e.lot}</td>
      <td>${e.exp}</td>
      <td>${e.qty}</td>
    `;

    tbody.appendChild(row);
  });
}

// ========================
// SEND BACK TO SCANNER
// ========================
document.getElementById("sendBtn").onclick = () => {
  localStorage.setItem("lotExpReturn", JSON.stringify({
    sku: selectedSKU,
    entries
  }));

  window.location.href = "scanner.html";
};

// ========================
// INIT
// ========================
loadCSV();

</script>

</body>
</html>
