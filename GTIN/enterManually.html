<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Manual Entry Wizard</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input, select, button {
    width: 90%;
    font-size: 14px;
    padding: 8px;
    margin-top: 4px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  #suggestions {
    width: 90%;
    background: #222;
    max-height: 80px;
    overflow-y: auto;
    font-size: 12px;
  }

  .suggestion {
    padding: 4px;
    border-bottom: 1px solid #333;
    cursor: pointer;
  }

  .suggestion:hover {
    background: #444;
  }

  table {
    width: 95%;
    font-size: 12px;
    border-collapse: collapse;
    margin-top: 6px;
  }

  td, th {
    border-bottom: 1px solid #444;
    padding: 4px;
    text-align: center;
  }

  .hidden { display: none; }
</style>
</head>

<body>

<div id="stepSku">
  <input id="skuSearch" placeholder="Search SKU..." />
  <div id="suggestions"></div>
</div>

<div id="stepLot" class="hidden">
  <input id="lotInput" placeholder="Enter LOT" />
</div>

<div id="stepExp" class="hidden">
  <select id="yearSelect"></select>
  <select id="monthSelect"></select>
  <select id="daySelect"></select>
  <button id="skipExp">Skip Exp</button>
</div>

<div id="stepQty" class="hidden">
  <input id="qtyInput" type="number" value="1" min="1" />
</div>

<button id="addBtn" class="hidden">Add Item</button>

<table>
  <thead>
    <tr>
      <th>LOT</th>
      <th>EXP</th>
      <th>QTY</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<button id="sendBtn">Send to Scanner</button>

<script src="config.js"></script>

<script>
// ========================
// STATE
// ========================
let skuMap = {}; // SKU list
let selectedSKU = "";
let entries = [];
let current = {};

// ========================
// LOAD CSV (SKU list)
// ========================
async function loadCSV() {
  const res = await fetch(CONFIG.CSV_URL + "?t=" + Date.now(), { cache: "no-store" });
  const text = await res.text();

  skuMap = {};

  text.split("\n").slice(1).forEach(line => {
    const cols = line.split(",");
    const sku = cols[0]?.trim();
    if (sku) skuMap[sku] = true;
  });
}

// ========================
// SKU SEARCH
// ========================
const skuSearch = document.getElementById("skuSearch");
const suggestions = document.getElementById("suggestions");

skuSearch.addEventListener("input", () => {
  const val = skuSearch.value.toUpperCase();
  suggestions.innerHTML = "";

  if (!val) return;

  Object.keys(skuMap)
    .filter(sku => sku.includes(val))
    .slice(0, 6)
    .forEach(sku => {
      const div = document.createElement("div");
      div.className = "suggestion";
      div.textContent = sku;

      div.onclick = () => {
        selectedSKU = sku;
        skuSearch.value = sku;
        suggestions.innerHTML = "";
        nextStep("lot");
      };

      suggestions.appendChild(div);
    });
});

// ========================
// STEP CONTROL
// ========================
function nextStep(step) {
  document.getElementById("stepSku").classList.add("hidden");
  document.getElementById("stepLot").classList.add("hidden");
  document.getElementById("stepExp").classList.add("hidden");
  document.getElementById("stepQty").classList.add("hidden");
  document.getElementById("addBtn").classList.add("hidden");

  if (step === "lot") document.getElementById("stepLot").classList.remove("hidden");
  if (step === "exp") document.getElementById("stepExp").classList.remove("hidden");
  if (step === "qty") document.getElementById("stepQty").classList.remove("hidden");
  if (step === "add") document.getElementById("addBtn").classList.remove("hidden");
}

// ========================
// LOT → EXP → QTY FLOW
// ========================
document.getElementById("lotInput").addEventListener("change", () => {
  current.lot = document.getElementById("lotInput").value.trim();
  nextStep("exp");
});

// EXP SETUP
const y = document.getElementById("yearSelect");
const m = document.getElementById("monthSelect");
const d = document.getElementById("daySelect");

function initDates() {
  const now = new Date();

  for (let i = now.getFullYear(); i <= now.getFullYear() + 10; i++) {
    y.innerHTML += `<option value="${i}">${i}</option>`;
  }

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  months.forEach((mm, i) => {
    m.innerHTML += `<option value="${i+1}">${mm}</option>`;
  });

  for (let i = 1; i <= 31; i++) {
    d.innerHTML += `<option value="${i}">${i}</option>`;
  }
}

document.getElementById("skipExp").onclick = () => {
  current.exp = "";
  nextStep("qty");
};

y.onchange = m.onchange = d.onchange = () => {
  if (y.value && m.value && d.value) {
    current.exp = `${y.value}-${m.value}-${d.value}`;
    nextStep("qty");
  }
};

// ========================
// QTY
// ========================
document.getElementById("qtyInput").addEventListener("change", () => {
  nextStep("add");
});

// ========================
// ADD
// ========================
document.getElementById("addBtn").onclick = () => {
  const qty = parseInt(document.getElementById("qtyInput").value || "1");

  const existing = entries.find(e =>
    e.lot === current.lot && e.exp === current.exp
  );

  if (existing) {
    existing.qty += qty;
  } else {
    entries.push({
      sku: selectedSKU,
      lot: current.lot,
      exp: current.exp,
      qty
    });
  }

  render();

  // reset flow
  document.getElementById("lotInput").value = "";
  document.getElementById("qtyInput").value = "1";
  current = {};
  nextStep("lot");
};

// ========================
// TABLE
// ========================
function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  entries.forEach(e => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${e.lot}</td>
      <td>${e.exp || ""}</td>
      <td>${e.qty}</td>
    `;

    tbody.appendChild(row);
  });
}

// ========================
// SEND BACK
// ========================
document.getElementById("sendBtn").onclick = () => {
  localStorage.setItem("lotExpReturn", JSON.stringify({
    sku: selectedSKU,
    entries
  }));

  window.location.href = "scanner.html";
};

// ========================
// INIT
// ========================
loadCSV();
initDates();
nextStep("sku");

</script>

</body>
</html>
