<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Manual Entry</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input, button {
    width: 90%;
    font-size: 14px;
    padding: 8px;
    margin-top: 4px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  #suggestions {
    width: 90%;
    background: #222;
    max-height: 90px;
    overflow-y: auto;
    font-size: 12px;
  }

  .sug {
    padding: 5px;
    border-bottom: 1px solid #333;
    cursor: pointer;
  }

  .sug:hover {
    background: #444;
  }

  table {
    width: 95%;
    font-size: 12px;
    border-collapse: collapse;
    margin-top: 6px;
  }

  td, th {
    border-bottom: 1px solid #444;
    padding: 4px;
    text-align: center;
  }

  .hidden { display: none; }
</style>
</head>

<body>

<!-- STEP 1: SKU -->
<input id="skuInput" placeholder="Search SKU..." />
<div id="suggestions"></div>

<!-- STEP 2: LOT -->
<input id="lotInput" class="hidden" placeholder="Enter LOT" />

<!-- STEP 3: EXP -->
<input id="expInput" class="hidden" placeholder="EXP (optional - press Enter to skip)" />

<!-- STEP 4: QTY -->
<input id="qtyInput" class="hidden" type="number" value="1" min="1" />

<button id="addBtn" class="hidden">Add Item</button>
<button id="sendBtn">Send to Scanner</button>

<table>
  <thead>
    <tr>
      <th>LOT</th>
      <th>EXP</th>
      <th>QTY</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script src="config.js"></script>

<script>
// ========================
// STATE
// ========================
let skuMap = {};
let selectedSKU = null;
let entries = {};
let current = {};

// ========================
// LOAD CSV (Item = SKU)
// ========================
async function loadCSV() {
  const res = await fetch(CONFIG.CSV_URL + "?t=" + Date.now(), { cache: "no-store" });
  const text = await res.text();

  skuMap = {};

  const lines = text.split("\n");
  const headers = lines[0].split(",");

  const itemIndex = headers.indexOf("Item");

  lines.slice(1).forEach(line => {
    const cols = line.split(",");
    const item = cols[itemIndex]?.trim();

    if (item) skuMap[item] = true;
  });
}

// ========================
// STEP CONTROL
// ========================
function show(el) { document.getElementById(el).classList.remove("hidden"); }
function hide(el) { document.getElementById(el).classList.add("hidden"); }

function next(step) {
  ["lotInput","expInput","qtyInput","addBtn"].forEach(hide);

  if (step === "lot") show("lotInput");
  if (step === "exp") show("expInput");
  if (step === "qty") show("qtyInput");
  if (step === "add") show("addBtn");
}

// ========================
// SKU SEARCH
// ========================
const skuInput = document.getElementById("skuInput");
const suggestions = document.getElementById("suggestions");

skuInput.addEventListener("input", () => {
  const val = skuInput.value.toUpperCase();
  suggestions.innerHTML = "";

  if (!val) return;

  Object.keys(skuMap)
    .filter(sku => sku.includes(val))
    .slice(0, 8)
    .forEach(sku => {
      const div = document.createElement("div");
      div.className = "sug";
      div.textContent = sku;

      div.onclick = () => {
        selectedSKU = sku;
        skuInput.value = sku;
        suggestions.innerHTML = "";

        next("lot");
        show("lotInput");
      };

      suggestions.appendChild(div);
    });
});

// ========================
// LOT STEP
// ========================
document.getElementById("lotInput").addEventListener("change", (e) => {
  current.lot = e.target.value.trim();
  next("exp");
  show("expInput");
});

// ========================
// EXP STEP
// ========================
document.getElementById("expInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    current.exp = e.target.value.trim();
    next("qty");
    show("qtyInput");
  }
});

// ========================
// QTY STEP
// ========================
document.getElementById("qtyInput").addEventListener("change", () => {
  next("add");
  show("addBtn");
});

// ========================
// ADD ITEM
// ========================
document.getElementById("addBtn").onclick = () => {
  const qty = parseInt(document.getElementById("qtyInput").value || "1");

  const key = `${current.lot}_${current.exp}`;

  if (!entries[key]) {
    entries[key] = {
      sku: selectedSKU,
      lot: current.lot,
      exp: current.exp || "",
      qty: 0
    };
  }

  entries[key].qty += qty;

  render();

  // reset only lot/exp/qty
  current = {};
  document.getElementById("lotInput").value = "";
  document.getElementById("expInput").value = "";
  document.getElementById("qtyInput").value = "1";

  next("lot");
  show("lotInput");
};

// ========================
// TABLE
// ========================
function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  Object.values(entries).forEach(e => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${e.lot}</td>
      <td>${e.exp}</td>
      <td>${e.qty}</td>
    `;

    tbody.appendChild(row);
  });
}

// ========================
// SEND BACK
// ========================
document.getElementById("sendBtn").onclick = () => {
  localStorage.setItem("lotExpReturn", JSON.stringify({
    sku: selectedSKU,
    entries: Object.values(entries)
  }));

  window.location.href = "scanner.html";
};

// ========================
// INIT
// ========================
loadCSV();

next("sku");

</script>

</body>
</html>
