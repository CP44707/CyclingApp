<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Receive Submit</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input, select, button {
    width: 90%;
    font-size: 16px;
    padding: 8px;
    margin-top: 6px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  #status {
    font-size: 12px;
    margin-top: 6px;
    color: orange;
  }
</style>
</head>

<body>

<input id="poInput" placeholder="Enter PO Number" />

<button id="submitBtn">Submit Receiving</button>

<div id="status"></div>

<script src="config.js"></script>

<script>

const poInput = document.getElementById("poInput");
const status = document.getElementById("status");

// --------------------
// BEEP
// --------------------
function beep(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 100);
}

// --------------------
// FORMAT EXP (YYMMDD -> YYYY-MM-DD)
// --------------------
function formatDate(input) {
  if (!input) return "";

  const s = String(input).trim();

  if (s.length === 6 && /^\d+$/.test(s)) {
    const yy = s.slice(0, 2);
    const mm = s.slice(2, 4);
    const dd = s.slice(4, 6);

    return `20${yy}-${mm}-${dd}`;
  }

  return input;
}

// --------------------
// LOAD TABLE
// --------------------
let table = JSON.parse(localStorage.getItem("cycleTable") || "[]");

// --------------------
// RECEIPT ID
// --------------------
const receiptId = localStorage.getItem("receiptId") || crypto.randomUUID();
localStorage.setItem("receiptId", receiptId);

// --------------------
// SUBMIT
// --------------------
document.getElementById("submitBtn").onclick = async () => {

  const po = poInput.value.trim();

  if (!po) {
    status.textContent = "Enter PO number";
    beep(150);
    return;
  }

  if (!table.length) {
    status.textContent = "No data in table";
    beep(150);
    return;
  }

  try {

    const timestamp = new Date().toISOString();

    const requests = table.map(item => {

      return fetch(RECEIVE_URL, {
        method: "POST",
        body: JSON.stringify({
          receiptId: receiptId,
          timestamp: timestamp,
          po: po,
          session: "",
          sku: item.sku,
          lot: item.lot,
          exp: formatDate(item.exp),
          qty: item.qty
        }),
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        }
      });

    });

    await Promise.all(requests);

    status.textContent = "Submitted";
    beep(880);

    localStorage.removeItem("cycleTable");
    localStorage.removeItem("receiptId");

    setTimeout(() => {
      window.location.href = "scanner.html";
    }, 500);

  } catch (err) {
    status.textContent = "Error submitting";
    beep(150);
  }
};

</script>

</body>
</html>
