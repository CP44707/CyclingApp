<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Receiving Submit</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  button {
    width: 90%;
    font-size: 16px;
    padding: 10px;
    margin-top: 8px;
    background: #333;
    color: white;
    border: none;
  }

  #status {
    margin-top: 10px;
    font-size: 13px;
    color: orange;
    text-align: center;
  }
</style>
</head>

<body>

<button id="sendBtn">Send Receiving</button>
<button onclick="window.location.href='scanner.html'">Back</button>

<div id="status"></div>

<script src="config.js"></script>

<script>

const status = document.getElementById("status");

// =========================
// LOAD TABLE (same as scanner)
// =========================
let table = JSON.parse(localStorage.getItem("cycleTable") || "[]");

// =========================
// RECEIPT ID (persistent per session)
// =========================
const receiptId = localStorage.getItem("receiptId") || crypto.randomUUID();
localStorage.setItem("receiptId", receiptId);

// =========================
// PO + SESSION (optional fallback safety)
// =========================
const po = localStorage.getItem("poNumber") || "";
const session = localStorage.getItem("receivingSession") || "";

// =========================
// FORMAT EXP (YYMMDD -> YYYY-MM-DD)
// =========================
function formatExp(exp) {
  if (!exp || exp.length !== 6) return "";

  const yy = exp.slice(0,2);
  const mm = exp.slice(2,4);
  const dd = exp.slice(4,6);

  return `20${yy}-${mm}-${dd}`;
}

// =========================
// SEND
// =========================
document.getElementById("sendBtn").onclick = async () => {

  if (!table.length) {
    status.textContent = "No data to send";
    return;
  }

  status.textContent = "Sending...";

  const timestamp = new Date().toISOString();

  try {

    const requests = table.map(item => {

      return fetch(RECEIVE_URL, {
        method: "POST",
        body: JSON.stringify({
          receiptId: receiptId,
          timestamp: timestamp,
          po: po,
          session: session,
          sku: item.sku,
          lot: item.lot,
          exp: formatExp(item.exp),
          qty: item.qty
        }),
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        }
      });

    });

    await Promise.all(requests);

    status.textContent = "Sent successfully";

    // cleanup (match your existing flow style)
    localStorage.removeItem("cycleTable");
    localStorage.removeItem("receiptId");

  } catch (err) {
    console.log(err);
    status.textContent = "Send failed";
  }
};

</script>

</body>
</html>
