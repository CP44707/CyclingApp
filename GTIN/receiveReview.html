<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Receiving Review</title>

<style>
body {
    font-family: Arial;
    background: rgb(0,0,0);
    color: rgb(255,224,0);
    margin: 0;
    padding: 12px;
}

h2 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
    font-size: 14px;
}

th, td {
    border: 1px solid rgb(255,224,0);
    padding: 8px;
    text-align: center;
}

th {
    background: rgb(255,224,0);
    color: rgb(0,0,0);
}

button {
    margin: 6px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 16px;
    background: rgb(0,0,0);
    color: rgb(255,224,0);
    border: 2px solid rgb(255,224,0);
    border-radius: 8px;
}

button:active,
button:hover {
    background: rgb(255,224,0);
    color: rgb(0,0,0);
}

#status {
    margin-top: 12px;
    text-align: center;
}
</style>
</head>

<body>

<h2>Receiving Review</h2>

<table>
<thead>
<tr>
    <th>SKU</th>
    <th>Lot</th>
    <th>Exp</th>
    <th>Qty</th>
    <th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div style="text-align:center;">
    <button onclick="sendToSheet()">Send to Sheet</button>
    <button onclick="finish()">Finish</button>
</div>

<div id="status"></div>

<script src="config.js"></script>

<script>

let data = JSON.parse(localStorage.getItem("receiveReviewData") || "[]");
const tbody = document.getElementById("tbody");
const status = document.getElementById("status");

const SHEET_URL = CONFIG.RECEIVE_URL;

// =========================
// RENDER
// =========================
function render() {
    tbody.innerHTML = "";

    data.forEach((row, i) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.sku}</td>
            <td>${row.lot}</td>
            <td>${row.exp}</td>
            <td>${row.qty}</td>
            <td><button onclick="deleteRow(${i})">Delete</button></td>
        `;

        tbody.appendChild(tr);
    });
}

// =========================
// DELETE
// =========================
function deleteRow(i) {
    if (!confirm("Delete row?")) return;
    data.splice(i, 1);
    localStorage.setItem("receiveReviewData", JSON.stringify(data));
    render();
}

// =========================
// SEND TO SHEET
// =========================
async function sendToSheet() {

    if (!data.length) return alert("No data");

    status.innerText = "Sending...";

    for (let item of data) {

        await fetch(SHEET_URL, {
            method: "POST",
            body: JSON.stringify(item),
            mode: "no-cors",
            headers: {
                "Content-Type": "text/plain"
            }
        });

    }

    status.innerText = "Sent ✔";
}

// =========================
// FINISH
// =========================
function finish() {
    localStorage.removeItem("receiveReviewData");
    window.location.href = "cycle.html";
}

// INIT
render();

</script>

</body>
</html>
