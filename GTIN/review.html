<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Cycle Review</title>

<style>
body {
    font-family: Arial;
    background: rgb(0,0,0);
    color: rgb(255,224,0);
    margin: 0;
    padding: 12px;
}

h2 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 10px;
}

#meta {
    text-align: center;
    font-size: 16px;
    margin-bottom: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
    font-size: 14px;
}

th, td {
    border: 1px solid rgb(255,224,0);
    padding: 8px;
    text-align: center;
    color: rgb(255,224,0);
}

th {
    background: rgb(255,224,0);
    color: rgb(0,0,0);
    font-weight: bold;
}

button {
    margin: 6px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 16px;
    background: rgb(0,0,0);
    color: rgb(255,224,0);
    border: 2px solid rgb(255,224,0);
    border-radius: 8px;
}

button:active,
button:hover {
    background: rgb(255,224,0);
    color: rgb(0,0,0);
}

#status {
    margin-top: 12px;
    font-weight: bold;
    text-align: center;
    font-size: 16px;
    min-height: 24px;
}

.actions {
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>Cycle Review</h2>

<div id="meta"></div>

<table>
<thead>
<tr>
    <th>SKU</th>
    <th>Lot</th>
    <th>Exp</th>
    <th>Qty</th>
    <th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<div class="actions">
    <button onclick="sendToSheet()">Send to Sheet</button>
    <button onclick="finish()">Finish</button>
</div>

<div id="status"></div>

<script src="config.js"></script>

<script>

// =========================
// LOAD DATA
// =========================
let data = JSON.parse(localStorage.getItem("reviewData") || "[]");

const tbody = document.getElementById("tbody");
const status = document.getElementById("status");
const meta = document.getElementById("meta");

// =========================
// CONFIG
// =========================
const SHEET_URL = CONFIG.CYCLE_URL;

// =========================
// SAFE VALUE HELPER (FIXES UNDEFINED ISSUE)
// =========================
function safe(v) {
    return (v === undefined || v === null) ? "" : v;
}

// =========================
// META DISPLAY
// =========================
function renderMeta() {
    if (!data.length) {
        meta.innerText = "No data loaded.";
        return;
    }

    const first = data[0];

    meta.innerHTML = `
        <div><strong>Warehouse:</strong> ${safe(first.warehouse)}</div>
        <div><strong>Bin:</strong> ${safe(first.bin)}</div>
        <div><strong>Type:</strong> ${safe(first.cycle)}</div>
    `;
}

// =========================
// TABLE (FIXED SAFE FIELDS)
// =========================
function renderTable() {
    tbody.innerHTML = "";

    data.forEach((row, index) => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${safe(row.sku)}</td>
            <td>${safe(row.lot)}</td>
            <td>${safe(row["Expiration Date"] ?? row.exp)}</td>
            <td>${safe(row["On Hand"] ?? row.qty)}</td>
            <td>
                <button onclick="deleteRow(${index})">Delete</button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

// =========================
// DELETE
// =========================
function deleteRow(index) {
    if (!confirm("Delete this row?")) return;

    data.splice(index, 1);
    localStorage.setItem("reviewData", JSON.stringify(data));

    renderTable();
    renderMeta();
}

// =========================
// SEND (UNCHANGED LOGIC, SAFE TIMESTAMP FIX)
// =========================
async function sendToSheet() {

    if (!data.length) {
        alert("No data to send.");
        return;
    }

    status.innerText = "Sending...";

    try {
        for (let item of data) {

            await fetch(SHEET_URL, {
                method: "POST",
                body: JSON.stringify({
                    ...item,
                    // ensures timestamp ALWAYS exists
                    timestamp: item.timestamp || new Date().toISOString()
                }),
                mode: "no-cors",
                headers: {
                    "Content-Type": "text/plain"
                }
            });

        }

        status.innerText = "✅ Sent successfully";
    } catch (err) {
        console.log(err);
        status.innerText = "❌ Error sending data";
    }
}

// =========================
// FINISH
// =========================
function finish() {
    if (!confirm("Finish and clear this cycle?")) return;

    localStorage.removeItem("reviewData");
    localStorage.removeItem("cycleTable");

    window.location.href = "cycle.html";
}

// =========================
// INIT
// =========================
renderMeta();
renderTable();

</script>

</body>
</html>
