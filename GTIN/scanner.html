<!DOCTYPE html>
<html>
<head>
  <title>Scanner</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 10px;
      overflow: hidden;
    }

    #banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      color: white;
      text-align: center;
      font-size: 22px;
      padding: 12px;
      display: none;
    }

    #main {
      margin-top: 60px;
    }

    #scanInput {
      width: 100%;
      font-size: 22px;
      padding: 10px;
    }

    #status {
      font-size: 18px;
      margin-top: 10px;
    }

    #skuBox {
      display: none;
      margin-top: 10px;
      border: 2px solid orange;
      padding: 10px;
    }

    #skuSearch {
      width: 100%;
      font-size: 18px;
      padding: 8px;
    }

    #skuList {
      max-height: 200px;
      overflow: hidden;
      margin: 5px 0 0 0;
      padding: 0;
      list-style: none;
    }

    #skuList li {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      font-size: 16px;
    }

    #skuList li:active {
      background: #eee;
    }

    button {
      width: 100%;
      font-size: 18px;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="banner"></div>

<div id="main">

  <input id="scanInput" placeholder="Scan barcode..." autocomplete="off">

  <div id="status"></div>

  <div id="skuBox">
    <div><b>GTIN not found — assign SKU</b></div>
    <input id="skuSearch" placeholder="Search SKU...">
    <ul id="skuList"></ul>
  </div>

  <button onclick="goBack()">Back</button>

</div>

<script src="config.js"></script>

<script>
// SOUNDS
const okSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const badSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
const warnSound = new Audio("https://www.soundjay.com/buttons/sounds/button-7.mp3");

// DATA
let gtinMap = new Map();   // GTIN -> SKU
let skuList = [];
let lastGTIN = null;

// ----------------------
// LOAD SHEET DATA
// ----------------------
async function loadData() {
  const res = await fetch(CONFIG.CSV_URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));
  rows.shift();

  gtinMap.clear();
  skuList = [];

  rows.forEach(r => {
    const sku = (r[0] || "").trim();
    const gtin = (r[1] || "").trim();

    if (sku) skuList.push(sku);
    if (sku && gtin) gtinMap.set(gtin, sku);
  });
}

// ----------------------
// GS1 PARSE (AI 01 ONLY)
// ----------------------
function extractGTIN(scan) {
  const match = scan.match(/01(\d{14})/);
  return match ? match[1] : null;
}

// ----------------------
// UI HELPERS
// ----------------------
function setBanner(text, color) {
  const b = document.getElementById("banner");
  b.textContent = text;
  b.style.background = color;
  b.style.display = "block";
  setTimeout(() => b.style.display = "none", 1500);
}

function setStatus(text) {
  document.getElementById("status").textContent = text;
}

// ----------------------
// SCAN HANDLER
// ----------------------
function handleScan(val) {
  const gtin = extractGTIN(val);

  document.getElementById("skuBox").style.display = "none";

  // ❌ NO GTIN
  if (!gtin) {
    setStatus("❌ No GTIN found");
    badSound.play();
    setBanner("Invalid barcode", "red");
    return;
  }

  // ✅ GTIN FOUND IN SHEET
  if (gtinMap.has(gtin)) {
    const sku = gtinMap.get(gtin);

    setStatus("SKU: " + sku);
    okSound.play();
    setBanner("SKU: " + sku, "green");
    return;
  }

  // ⚠️ GTIN NOT IN SHEET
  setStatus("⚠️ Unlinked GTIN: " + gtin);
  warnSound.play();
  setBanner("Assign SKU", "orange");

  lastGTIN = gtin;
  showSkuBox();
}

// ----------------------
// SKU ASSIGN UI
// ----------------------
function showSkuBox() {
  const box = document.getElementById("skuBox");
  box.style.display = "block";

  renderSkuList("");
  document.getElementById("skuSearch").focus();
}

function renderSkuList(filter) {
  const list = document.getElementById("skuList");
  list.innerHTML = "";

  skuList
    .filter(s => s.toLowerCase().includes(filter.toLowerCase()))
    .slice(0, 12)
    .forEach(sku => {
      const li = document.createElement("li");
      li.textContent = sku;

      li.onclick = () => assignSKU(sku);

      list.appendChild(li);
    });
}

async function assignSKU(sku) {
  if (!lastGTIN) return;

  await fetch(CONFIG.API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "assignSku",
      item: sku,
      gtin: lastGTIN
    }),
    headers: { "Content-Type": "application/json" }
  });

  gtinMap.set(lastGTIN, sku);

  setStatus("✔ Linked: " + sku);
  setBanner("Saved", "blue");
  okSound.play();

  document.getElementById("skuBox").style.display = "none";
}

// ----------------------
// EVENTS
// ----------------------

// scanner input (ENTER triggers scan)
document.getElementById("scanInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    handleScan(e.target.value.trim());
    e.target.value = "";
  }
});

// SKU search
document.getElementById("skuSearch").addEventListener("input", e => {
  renderSkuList(e.target.value);
});

// KEEP FOCUS ALWAYS (handheld scanner mode)
setInterval(() => {
  document.getElementById("scanInput").focus();
}, 500);

// INIT
window.onload = loadData;

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
