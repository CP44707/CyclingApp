<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Scanner</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  input {
    width: 90%;
    font-size: 18px;
    padding: 10px;
    text-align: center;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>

<body>

<input id="scanInput" autofocus placeholder="Scan barcode..." />
<div id="status"></div>

<script src="config.js"></script>

<script>
const input = document.getElementById("scanInput");
const status = document.getElementById("status");

let map = new Map();

// --------------------
// SIMPLE BEEP
// --------------------
function beep(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 150);
}

// --------------------
// LOAD SHEET (DO NOT OVER-PARSE)
// --------------------
async function loadData() {
  const res = await fetch(CONFIG.CSV_URL + "?cache=" + Date.now());
  const text = await res.text();

  const lines = text.trim().split("\n");

  map.clear();

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");

    const sku = (cols[0] || "").trim();
    const gtin = (cols[1] || "").trim();

    if (gtin && sku) {
      map.set(gtin, sku);
    }
  }

  console.log("Loaded:", map.size);
}

loadData();

// --------------------
// EXTRACT GTIN (KEEP SIMPLE)
// --------------------
function extractGTIN(raw) {
  raw = (raw || "").replace(/\s+/g, "");

  const match = raw.match(/01(\d{14})/);
  return match ? match[1] : null;
}

// --------------------
// SCAN HANDLER
// --------------------
async function handleScan(value) {
  const gtin = extractGTIN(value);

  if (!gtin) {
    status.textContent = "Invalid barcode";
    status.style.color = "red";
    beep(150);
    input.value = "";
    return;
  }

  // IMPORTANT: compare EXACT STRING ONLY
  if (map.has(gtin)) {
    const sku = map.get(gtin);

    status.textContent = "SKU: " + sku;
    status.style.color = "lime";
    beep(880);

    input.value = "";
    return;
  }

  // NOT FOUND
  status.textContent = "Not found → assign";
  status.style.color = "orange";

  window.location.href = "assign.html?gtin=" + encodeURIComponent(gtin);
}

// --------------------
// AUTO TRIGGER (scanner friendly)
// --------------------
let buffer = "";
let timer;

input.addEventListener("input", (e) => {
  buffer = e.target.value;

  clearTimeout(timer);

  timer = setTimeout(() => {
    if (buffer) {
      handleScan(buffer);
      buffer = "";
    }
  }, 80);
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    handleScan(input.value);
    input.value = "";
  }
});

// keep focus
setInterval(() => input.focus(), 500);
</script>

</body>
</html>
