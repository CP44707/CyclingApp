<script src="config.js"></script>
<script>
const input = document.getElementById("scanInput");
const status = document.getElementById("status");

const map = new Map();

// --------------------
// AUDIO
// --------------------
const ok = new AudioContext();
const bad = new AudioContext();

function beep(freq, ctx, duration) {
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), duration);
}

function goodBeep() {
  beep(880, ok, 120);
}

function badBeep() {
  beep(180, bad, 300);
}

// --------------------
// NORMALIZE (IMPORTANT FIX)
// --------------------
function norm(v) {
  return (v || "")
    .toString()
    .trim()
    .replace(/\r/g, "")
    .replace(/\s+/g, "");
}

// --------------------
// LOAD CSV INTO MAP (YOUR ORIGINAL FIXED)
// --------------------
async function loadData() {
  const res = await fetch(CONFIG.CSV_URL + "?cache=" + Date.now());
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));
  rows.shift(); // remove headers

  map.clear();

  rows.forEach(r => {
    const sku = norm(r[0]);
    const gtin = norm(r[1]);

    if (sku && gtin) {
      map.set(gtin, sku);
    }
  });

  console.log("Loaded GTINs:", map.size);
}

loadData();

// --------------------
// UI HELPERS
// --------------------
function show(msg, color) {
  status.textContent = msg;
  status.style.color = color;
}

// --------------------
// MAIN SCAN HANDLER
// --------------------
function handleScan(raw) {
  const gtin = extractGTIN(raw);

  if (!gtin) {
    show("Invalid barcode", "red");
    badBeep();
    input.focus();
    return;
  }

  const cleanGTIN = norm(gtin);

  // =========================
  // FAST LOOKUP (FIXED CORE)
  // =========================
  if (map.has(cleanGTIN)) {
    const sku = map.get(cleanGTIN);

    show("SKU: " + sku, "#4dff88");
    goodBeep();

    setTimeout(() => {
      input.value = "";
      input.focus();
    }, 200);

    return;
  }

  // =========================
  // NOT FOUND → ASSIGN FLOW
  // =========================
  show("GTIN not found → assign", "orange");

  window.location.href =
    "assign.html?gtin=" + encodeURIComponent(cleanGTIN);
}

// --------------------
// GTIN PARSER
// --------------------
function extractGTIN(raw) {
  raw = norm(raw);

  const match = raw.match(/\(?01\)?(\d{14,18})/);
  return match ? match[1] : null;
}

// --------------------
// SCANNER INPUT (AUTO ENTER FIX)
// --------------------
let buffer = "";
let timer = null;

input.addEventListener("input", (e) => {
  buffer = e.target.value;

  clearTimeout(timer);

  timer = setTimeout(() => {
    if (buffer.length > 0) {
      handleScan(buffer);
      buffer = "";
    }
  }, 100);
});

// fallback Enter support
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    handleScan(input.value);
    input.value = "";
  }
});

// keep focus (handheld stability)
setInterval(() => input.focus(), 500);
</script>
