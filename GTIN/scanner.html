<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Cycle Counter</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input, button {
    width: 90%;
    font-size: 16px;
    padding: 8px;
    margin-top: 4px;
    text-align: center;
  }

  button {
    background: #333;
    color: white;
    border: none;
  }

  #status {
    margin: 6px;
    font-size: 13px;
    text-align: center;
  }

  table {
    width: 95%;
    font-size: 12px;
    border-collapse: collapse;
  }

  td, th {
    border-bottom: 1px solid #444;
    padding: 4px;
    text-align: center;
  }

  tr:hover {
    background: #222;
  }
</style>
</head>

<body>

<input id="scanInput" autofocus placeholder="Scan barcode..." />
<button id="manualBtn">Manual Entry</button>
<button id="clearBtn">Clear Table</button>

<div id="status"></div>

<table>
  <thead>
    <tr>
      <th>SKU</th>
      <th>Lot</th>
      <th>Exp</th>
      <th>Qty</th>
      <th>Del</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script src="config.js"></script>

<script>
const input = document.getElementById("scanInput");
const status = document.getElementById("status");
const tbody = document.getElementById("tbody");
const manualBtn = document.getElementById("manualBtn");
const clearBtn = document.getElementById("clearBtn");

let currentEntry = { gtin: null, lot: null, exp: null, sku: null };
let skuMap = {};

// ========================
// PERSISTED TABLE STATE
// ========================
let scannedItems = JSON.parse(localStorage.getItem("cycleTable") || "[]");

manualBtn.addEventListener("click", () => {
  window.location.href = "enterManually.html";
});

clearBtn.addEventListener("click", () => {
  scannedItems = [];
  saveTable();
  renderTable();
});

function saveTable() {
  localStorage.setItem("cycleTable", JSON.stringify(scannedItems));
}

// --------------------
// AUDIO
// --------------------
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq) {
  const o = audioCtx.createOscillator();
  o.frequency.value = freq;
  o.connect(audioCtx.destination);
  o.start();
  setTimeout(() => o.stop(), 100);
}

// --------------------
// CLEAN
// --------------------
function clean(v) {
  return (v || "").toString().replace(/\r/g, "").trim();
}

// --------------------
// FORMAT DATE
// --------------------
function formatExp(exp) {
  if (!exp || exp.length !== 6) return exp;

  const year = "20" + exp.slice(0,2);
  const month = parseInt(exp.slice(2,4), 10) - 1;
  const day = exp.slice(4,6);

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  return `${day}-${months[month]}-${year.slice(2)}`;
}

// --------------------
// MASTER PARSER
// --------------------
function parseBarcode(raw) {
  raw = clean(raw);

  if (/\(01\)/.test(raw)) {
    return parseBracketed(raw);
  } else {
    return parseRawGS1(raw);
  }
}

// --------------------
// BRACKETED PARSER (UNCHANGED)
// --------------------
function parseBracketed(raw) {
  let result = { gtin: null, exp: null, lot: null };

  const gtinMatch = raw.match(/\(01\)(\d{14})/);
  const expMatch = raw.match(/\(17\)(\d{6})/);
  const lotMatch = raw.match(/\(10\)([^\(]+)/);

  if (gtinMatch) result.gtin = gtinMatch[1];
  if (expMatch) result.exp = expMatch[1];
  if (lotMatch) result.lot = lotMatch[1].trim();

  return result;
}

// ======================================================
// GS1 STATE MACHINE PARSER
// ======================================================
function parseRawGS1(raw) {
  let data = raw.replace(/\s+/g, "");

  let result = { gtin: null, exp: null, lot: null };

  let i = 0;

  while (i < data.length) {

    const ai = data.slice(i, i + 2);

    if (ai === "01" && result.gtin === null) {
      result.gtin = data.slice(i + 2, i + 16);
      i += 16;
      continue;
    }

    if (ai === "17" && result.exp === null) {
      result.exp = data.slice(i + 2, i + 8);
      i += 8;
      continue;
    }

    if (ai === "11") {
      i += 8;
      continue;
    }

    if (ai === "10" && result.lot === null) {
      let start = i + 2;
      let j = start;

    while (j < data.length) {

      const char = data[j];
      const nextAI = data.slice(j, j + 2);

      // 🔥 separator / non-alphanumeric ends LOT
      if (!/[A-Za-z0-9]/.test(char)) break;

      // 🔥 only treat as AI if it looks like a boundary
      const isBoundary =
        j === 0 || !/[A-Za-z0-9]/.test(data[j - 1]);

      if (isBoundary &&
          (nextAI === "01" || nextAI === "17" || nextAI === "11")) {

        const after = data.slice(j + 2, j + 8);

        // only stop if it's a REAL AI (6 digits after)
        if (/^\d{6}$/.test(after)) {
          break;
        }
      }

      j++;
    }

      result.lot = data.slice(start, j);
      i = j;
      continue;
    }

    i++;
  }

  return result;
}

// --------------------
// LOAD CSV
// --------------------
async function loadCSV() {
  const res = await fetch(CONFIG.CSV_URL);
  const text = await res.text();

  text.split("\n").slice(1).forEach(line => {
    const cols = line.split(",");
    const sku = clean(cols[0]);
    const gtin = clean(cols[1]).replace(/\D/g, "").slice(-14);

    if (gtin) skuMap[gtin] = sku;
  });
}

function findSKU(gtin) {
  return skuMap[gtin] || null;
}

// --------------------
// TABLE
// --------------------
function addToTable(item) {
  const key = `${item.sku}_${item.lot}_${item.exp}`;
  const existing = scannedItems.find(i => i.key === key);

  if (existing) {
    existing.qty++;
  } else {
    scannedItems.push({ key, ...item, qty: 1 });
  }

  saveTable();
  renderTable();
}

function deleteRow(index) {
  scannedItems.splice(index, 1);
  saveTable();
  renderTable();
}

function editLot(index) {

  const value = prompt("Edit LOT", scannedItems[index].lot);

  if (value === null) return;

  scannedItems[index].lot = value.trim();

  scannedItems[index].key =
    `${scannedItems[index].sku}_${scannedItems[index].lot}_${scannedItems[index].exp}`;

  saveTable();
  renderTable();

  input.focus();
}

function editExp(index) {

  const current = scannedItems[index].exp || "";

  let currentYear = "2026";
  let currentMonth = "01";
  let currentDay = "01";

  if (current.length === 6) {
    currentYear = "20" + current.slice(0,2);
    currentMonth = current.slice(2,4);
    currentDay = current.slice(4,6);
  }

  const overlay = document.createElement("div");

  overlay.style.position = "fixed";
  overlay.style.inset = "0";
  overlay.style.background = "rgba(0,0,0,0.8)";
  overlay.style.display = "flex";
  overlay.style.flexDirection = "column";
  overlay.style.justifyContent = "center";
  overlay.style.alignItems = "center";
  overlay.style.zIndex = "9999";

  const box = document.createElement("div");

  box.style.background = "#222";
  box.style.padding = "12px";
  box.style.width = "90%";
  box.style.display = "flex";
  box.style.flexDirection = "column";
  box.style.gap = "6px";

  const yearSel = document.createElement("select");
  const monthSel = document.createElement("select");
  const daySel = document.createElement("select");

  yearSel.style.fontSize =
  monthSel.style.fontSize =
  daySel.style.fontSize = "16px";

  yearSel.style.padding =
  monthSel.style.padding =
  daySel.style.padding = "8px";

  // YEARS
  for (let y = 2024; y <= 2045; y++) {
    const opt = document.createElement("option");
    opt.value = y;
    opt.textContent = y;
    yearSel.appendChild(opt);
  }

  // MONTHS
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement("option");

    opt.value = String(m).padStart(2, "0");
    opt.textContent = String(m).padStart(2, "0");

    monthSel.appendChild(opt);
  }

  function isLeapYear(y) {
    return (
      (y % 4 === 0 && y % 100 !== 0) ||
      y % 400 === 0
    );
  }

  function updateDays() {

    const year = parseInt(yearSel.value);
    const month = parseInt(monthSel.value);

    let max = 31;

    if ([4,6,9,11].includes(month)) {
      max = 30;
    }

    if (month === 2) {
      max = isLeapYear(year) ? 29 : 28;
    }

    const old = daySel.value;

    daySel.innerHTML = "";

    for (let d = 1; d <= max; d++) {

      const opt = document.createElement("option");

      opt.value = String(d).padStart(2, "0");
      opt.textContent = String(d).padStart(2, "0");

      daySel.appendChild(opt);
    }

    if (parseInt(old) <= max) {
      daySel.value = old;
    }
  }

  yearSel.value = currentYear;
  monthSel.value = currentMonth;

  updateDays();

  daySel.value = currentDay;

  yearSel.onchange = updateDays;
  monthSel.onchange = updateDays;

  const noExpBtn = document.createElement("button");

  noExpBtn.textContent = "No Expiry";

  noExpBtn.style.padding = "8px";
  noExpBtn.style.background = "#333";
  noExpBtn.style.color = "white";
  noExpBtn.style.border = "none";

  noExpBtn.onclick = () => {

    scannedItems[index].exp = "";

    scannedItems[index].key =
      `${scannedItems[index].sku}_${scannedItems[index].lot}_${scannedItems[index].exp}`;

    saveTable();
    renderTable();

    document.body.removeChild(overlay);

    input.focus();
  };

  const saveBtn = document.createElement("button");

  saveBtn.textContent = "Save";

  saveBtn.style.padding = "8px";
  saveBtn.style.background = "#333";
  saveBtn.style.color = "white";
  saveBtn.style.border = "none";

  saveBtn.onclick = () => {

    scannedItems[index].exp =
      String(yearSel.value).slice(2) +
      monthSel.value +
      daySel.value;

    scannedItems[index].key =
      `${scannedItems[index].sku}_${scannedItems[index].lot}_${scannedItems[index].exp}`;

    saveTable();
    renderTable();

    document.body.removeChild(overlay);

    input.focus();
  };

  box.appendChild(yearSel);
  box.appendChild(monthSel);
  box.appendChild(daySel);
  box.appendChild(noExpBtn);
  box.appendChild(saveBtn);

  overlay.appendChild(box);

  document.body.appendChild(overlay);
}

function renderTable() {
  tbody.innerHTML = "";

  scannedItems.forEach((item, index) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.sku}</td>

      <td>
        <button
          onclick="editLot(${index})"
          style="width:auto;padding:2px 6px;font-size:12px;"
        >
          ${item.lot}
        </button>
      </td>

      <td>
        <button
          onclick="editExp(${index})"
          style="width:auto;padding:2px 6px;font-size:12px;"
        >
          ${formatExp(item.exp)}
        </button>
      </td>

      <td>${item.qty}</td>

      <td>
        <button onclick="deleteRow(${index})" style="width:auto;padding:2px 6px;font-size:12px;">
          X
        </button>
      </td>
    `;

    tbody.appendChild(row);
  });
}

// --------------------
// HANDLE SCAN (FIXED)
// --------------------
async function handleScan(value) {

  // 🔥 ALWAYS reload latest sheet before processing
  await loadCSV();

  // 🔥 reset every scan
  currentEntry = { gtin: null, lot: null, exp: null, sku: null };

  const parsed = parseBarcode(value);

  if (!parsed || !parsed.gtin) {
    status.textContent = "Invalid barcode";
    beep(150);
    return;
  }

  currentEntry.gtin = parsed.gtin;

  const sku = findSKU(parsed.gtin);

  if (!sku) {
    window.location.href = "assign.html?gtin=" + parsed.gtin;
    return;
  }

  currentEntry.sku = sku;

  if (parsed.exp) currentEntry.exp = parsed.exp;
  if (parsed.lot) currentEntry.lot = parsed.lot;

  // 🔥 FULL SCAN COMPLETE → save
  if (currentEntry.lot) {
    addToTable({
      sku: currentEntry.sku,
      lot: currentEntry.lot,
      exp: currentEntry.exp || ""
    });

    beep(880);
    return;
  }

  // 🔥 PARTIAL SCAN: GTIN + SKU exists but missing LOT
  // → go to LOT/EXP continuation screen
  window.location.href =
    "scanLotExp.html?sku=" + encodeURIComponent(currentEntry.sku) +
    "&gtin=" + encodeURIComponent(currentEntry.gtin);
}

// --------------------
// INPUT
// --------------------
let buffer = "";
let timer;

input.addEventListener("input", (e) => {
  buffer = e.target.value;
  clearTimeout(timer);

  timer = setTimeout(() => {
    if (buffer.length > 0) {
      handleScan(buffer);
      buffer = "";
      input.value = "";
    }
  }, 80);
});

// --------------------
// INIT
// --------------------
loadCSV();
renderTable();

setInterval(() => input.focus(), 500);



function handleReturnedLotExp() {
  const raw = localStorage.getItem("lotExpReturn");
  if (!raw) return;

  const returned = JSON.parse(raw);

  if (!returned || !returned.entries) return;

  returned.entries.forEach(e => {

    const count = e.qty || 1;

    for (let i = 0; i < count; i++) {
      addToTable({
        sku: returned.sku,
        lot: e.lot,
        exp: e.exp || ""
      });
    }

  });

  localStorage.removeItem("lotExpReturn");
}

handleReturnedLotExp();

</script>

</body>
</html>
