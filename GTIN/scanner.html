<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

<title>Scanner</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #scanInput {
    width: 90%;
    font-size: 18px;
    padding: 10px;
    text-align: center;
    border: none;
    outline: none;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>

<body>

<input id="scanInput" placeholder="Scan barcode..." autofocus />
<div id="status"></div>

<script src="config.js"></script>

<script>
const input = document.getElementById("scanInput");
const status = document.getElementById("status");

const map = new Map();

// --------------------
// AUDIO
// --------------------
function beep(freq, duration) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), duration);
}

function goodBeep() {
  beep(880, 120);
}

function badBeep() {
  beep(180, 300);
}

// --------------------
// NORMALIZATION (KEY FIX)
// --------------------
function normalizeGTIN(v) {
  return (v || "")
    .toString()
    .replace(/\D/g, "")   // digits only
    .padStart(14, "0")    // ensure leading zeros preserved
    .slice(-14);          // enforce exact 14-digit GTIN
}

// --------------------
// CSV PARSER (safe enough for simple Sheets export)
// --------------------
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");

  return lines.slice(1).map(line => {
    const cols = line.split(",");

    let obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = (cols[i] || "").trim();
    });

    return obj;
  });
}

// --------------------
// LOAD DATA INTO MAP
// --------------------
async function loadData() {
  try {
    const res = await fetch(CONFIG.CSV_URL + "?cache=" + Date.now());
    const text = await res.text();

    const rows = parseCSV(text);

    map.clear();

    rows.forEach(r => {
      const sku = (r.Item || "").trim();
      const gtin = normalizeGTIN(r.GTIN);

      if (sku && gtin) {
        map.set(gtin, sku);
      }
    });

    console.log("Loaded GTINs:", map.size);

  } catch (err) {
    status.textContent = "Failed to load data";
    status.style.color = "red";
    badBeep();
  }
}

loadData();

// --------------------
// UI HELPERS
// --------------------
function show(msg, color) {
  status.textContent = msg;
  status.style.color = color;
}

// --------------------
// GTIN EXTRACTION (STRICT GS1 AI 01)
// --------------------
function extractGTIN(raw) {
  raw = (raw || "")
    .toString()
    .replace(/\u001d/g, "")
    .replace(/\s+/g, "");

  const match = raw.match(/(?:\(?01\)?)(\d{14})(?!\d)/);

  return match ? match[1] : null;
}

// --------------------
// MAIN SCAN LOGIC
// --------------------
function handleScan(raw) {
  const gtin = extractGTIN(raw);

  if (!gtin) {
    show("Invalid barcode", "red");
    badBeep();
    input.focus();
    return;
  }

  const cleanGTIN = normalizeGTIN(gtin);

  // FAST LOOKUP
  if (map.has(cleanGTIN)) {
    const sku = map.get(cleanGTIN);

    show("SKU: " + sku, "#4dff88");
    goodBeep();

    setTimeout(() => {
      input.value = "";
      input.focus();
    }, 200);

    return;
  }

  // NOT FOUND → ASSIGN FLOW
  show("GTIN not found → assign", "orange");

  window.location.href =
    "assign.html?gtin=" + encodeURIComponent(cleanGTIN);
}

// --------------------
// AUTO SCAN DETECTION (NO ENTER REQUIRED)
// --------------------
let buffer = "";
let timer = null;

input.addEventListener("input", (e) => {
  buffer = e.target.value;

  clearTimeout(timer);

  timer = setTimeout(() => {
    if (buffer.length > 0) {
      handleScan(buffer);
      buffer = "";
    }
  }, 100);
});

// fallback Enter support
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    handleScan(input.value);
    input.value = "";
  }
});

// keep focus (handheld stability)
setInterval(() => input.focus(), 500);

</script>

</body>
</html>
