<!DOCTYPE html>
<html>
<head>
  <title>Scanner</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      height: 100%;
      overflow: hidden;
    }

    #banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      color: white;
      text-align: center;
      font-size: 20px;
      padding: 10px;
      display: none;
      z-index: 10;
    }

    #container {
      padding: 60px 10px 10px;
      box-sizing: border-box;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #scanInput {
      width: 100%;
      font-size: 24px;
      padding: 12px;
      box-sizing: border-box;
    }

    #status {
      font-size: 18px;
    }

    #skuBox {
      display: none;
      border: 2px solid orange;
      padding: 10px;
      flex: 1;
      overflow: hidden;
    }

    #skuSearch {
      width: 100%;
      font-size: 18px;
      padding: 8px;
      box-sizing: border-box;
    }

    #skuList {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }

    #skuList li {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    button {
      font-size: 18px;
      padding: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="banner"></div>

<div id="container">

  <input id="scanInput" placeholder="Scan barcode..." autocomplete="off">
  <div id="status"></div>

  <div id="skuBox">
    <div><b>GTIN not found — select SKU</b></div>
    <input id="skuSearch" placeholder="Search SKU...">
    <ul id="skuList"></ul>
  </div>

  <button onclick="goBack()">Back</button>

</div>

<script src="config.js"></script>

<script>
// --------------------
// SOUNDS
// --------------------
const okSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const badSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
const warnSound = new Audio("https://www.soundjay.com/buttons/sounds/button-7.mp3");

// --------------------
// DATA
// --------------------
let gtinToSku = new Map();
let skuList = [];
let currentGTIN = null;
let inSkuMode = false;

// --------------------
// LOAD SHEET DATA
// --------------------
async function loadData() {
  const res = await fetch(CONFIG.CSV_URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));
  rows.shift();

  gtinToSku.clear();
  skuList = [];

  rows.forEach(r => {
    const sku = (r[0] || "").trim();
    const gtin = (r[1] || "").trim();

    if (sku) skuList.push(sku);
    if (sku && gtin) gtinToSku.set(gtin, sku);
  });
}

// --------------------
// GTIN EXTRACT
// --------------------
function getGTIN(str) {
  const m = str.match(/01(\d{14})/);
  return m ? m[1] : null;
}

// --------------------
// UI
// --------------------
function banner(text, color) {
  const b = document.getElementById("banner");
  b.textContent = text;
  b.style.background = color;
  b.style.display = "block";
  setTimeout(() => b.style.display = "none", 1500);
}

function status(text) {
  document.getElementById("status").textContent = text;
}

// --------------------
// CORE SCAN LOGIC
// --------------------
function processScan(value) {
  if (inSkuMode) return;

  const gtin = getGTIN(value);

  document.getElementById("skuBox").style.display = "none";

  // ❌ NO GTIN
  if (!gtin) {
    status("No GTIN found");
    badSound.play();
    banner("Invalid barcode", "red");
    return;
  }

  // ✅ EXISTS
  if (gtinToSku.has(gtin)) {
    const sku = gtinToSku.get(gtin);

    status("SKU: " + sku);
    okSound.play();
    banner("SKU: " + sku, "green");
    return;
  }

  // ⚠️ NOT FOUND
  status("Unlinked GTIN: " + gtin);
  warnSound.play();
  banner("Assign SKU", "orange");

  currentGTIN = gtin;
  openSkuMode();
}

// --------------------
// SKU MODE
// --------------------
function openSkuMode() {
  inSkuMode = true;

  const box = document.getElementById("skuBox");
  box.style.display = "block";

  renderSkuList("");

  setTimeout(() => {
    document.getElementById("skuSearch").focus();
  }, 50);
}

function renderSkuList(filter) {
  const list = document.getElementById("skuList");
  list.innerHTML = "";

  skuList
    .filter(s => s.toLowerCase().includes(filter.toLowerCase()))
    .slice(0, 12)
    .forEach(sku => {
      const li = document.createElement("li");
      li.textContent = sku;
      li.onclick = () => assignSku(sku);
      list.appendChild(li);
    });
}

// --------------------
// ASSIGN SKU
// --------------------
async function assignSku(sku) {
  await fetch(CONFIG.API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "assignSku",
      item: sku,
      gtin: currentGTIN
    }),
    headers: { "Content-Type": "application/json" }
  });

  gtinToSku.set(currentGTIN, sku);

  okSound.play();
  banner("Saved: " + sku, "blue");
  status("Linked: " + sku);

  inSkuMode = false;
  document.getElementById("skuBox").style.display = "none";

  focusScan();
}

// --------------------
// EVENTS
// --------------------
document.getElementById("scanInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    processScan(e.target.value.trim());
    e.target.value = "";
  }
});

document.getElementById("skuSearch").addEventListener("input", e => {
  renderSkuList(e.target.value);
});

// KEEP SCAN FOCUS (SAFE)
function focusScan() {
  if (!inSkuMode) {
    document.getElementById("scanInput").focus();
  }
}

setInterval(() => {
  if (!inSkuMode && document.activeElement.id !== "skuSearch") {
    focusScan();
  }
}, 400);

// INIT
window.onload = () => {
  loadData();
  focusScan();
};

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
