<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

<title>Scanner</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #scanInput {
    width: 90%;
    font-size: 18px;
    padding: 10px;
    text-align: center;
    border: none;
    outline: none;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>

<body>

<input id="scanInput" placeholder="Scan barcode..." autofocus />
<div id="status"></div>

<script src="config.js"></script>
<script>
const input = document.getElementById("scanInput");
const status = document.getElementById("status");

const map = new Map();

// --------------------
// AUDIO
// --------------------
function beep(freq, duration) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), duration);
}

function goodBeep() {
  beep(880, 120);
}

function badBeep() {
  beep(180, 300);
}

// --------------------
// NORMALIZE
// --------------------
function norm(v) {
  return (v || "")
    .toString()
    .trim()
    .replace(/\r/g, "")
    .replace(/\s+/g, "");
}

// --------------------
// LOAD CSV INTO MAP
// --------------------
async function loadData() {
  try {
    const res = await fetch(CONFIG.CSV_URL + "?cache=" + Date.now());
    const text = await res.text();

    const rows = text.trim().split("\n").map(r => r.split(","));
    rows.shift(); // remove header

    map.clear();

    rows.forEach(r => {
      const sku = norm(r[0]);
      const gtin = norm(r[1]);

      if (sku && gtin) {
        map.set(gtin, sku);
      }
    });

    console.log("Loaded GTINs:", map.size);
  } catch (err) {
    status.textContent = "Failed to load data";
    status.style.color = "red";
    badBeep();
  }
}

loadData();

// --------------------
// UI HELP
// --------------------
function show(msg, color) {
  status.textContent = msg;
  status.style.color = color;
}

// --------------------
// GTIN EXTRACTION
// --------------------
function extractGTIN(raw) {
  raw = norm(raw);

  const match = raw.match(/\(?01\)?(\d{14,18})/);
  return match ? match[1] : null;
}

// --------------------
// MAIN SCAN LOGIC
// --------------------
function handleScan(raw) {
  const gtin = extractGTIN(raw);

  if (!gtin) {
    show("Invalid barcode", "red");
    badBeep();
    input.focus();
    return;
  }

  const cleanGTIN = norm(gtin);

  // ✅ FAST LOOKUP
  if (map.has(cleanGTIN)) {
    const sku = map.get(cleanGTIN);

    show("SKU: " + sku, "#4dff88");
    goodBeep();

    // ready for next scan
    setTimeout(() => {
      input.value = "";
      input.focus();
    }, 200);

    return;
  }

  // ❌ NOT FOUND → ASSIGN
  show("GTIN not found → assign", "orange");

  window.location.href =
    "assign.html?gtin=" + encodeURIComponent(cleanGTIN);
}

// --------------------
// SCANNER INPUT HANDLING
// (works without Enter key)
// --------------------
let buffer = "";
let timer = null;

input.addEventListener("input", (e) => {
  buffer = e.target.value;

  clearTimeout(timer);

  timer = setTimeout(() => {
    if (buffer.length > 0) {
      handleScan(buffer);
      buffer = "";
    }
  }, 100); // adjust if needed for your scanner speed
});

// fallback Enter support
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    handleScan(input.value);
    input.value = "";
  }
});

// keep focus (important for handheld scanners)
setInterval(() => input.focus(), 500);
</script>

</body>
</html>
