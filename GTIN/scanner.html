<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Scanner</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  input {
    width: 90%;
    font-size: 18px;
    padding: 10px;
    text-align: center;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>

<body>

<input id="scanInput" autofocus placeholder="Scan barcode..." />
<div id="status"></div>

<script src="config.js"></script>

<script>
const input = document.getElementById("scanInput");
const status = document.getElementById("status");

// --------------------
// BEEP
// --------------------
function beep(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 120);
}

// --------------------
// CLEAN STRING
// --------------------
function clean(v) {
  return (v || "")
    .toString()
    .replace(/\r/g, "")
    .trim();
}

// --------------------
// EXTRACT GTIN (STRICT 14 DIGITS AFTER 01)
// --------------------
function extractGTIN(raw) {
  raw = clean(raw).replace(/\s+/g, "");

  const match = raw.match(/01(\d{14})/);
  return match ? match[1] : null;
}

// --------------------
// SEARCH CSV DIRECTLY
// --------------------
async function findSKU(gtin) {
  const res = await fetch(CONFIG.CSV_URL + "&cache=" + Date.now());
  const text = await res.text();

  const lines = text.trim().split("\n");

  // loop rows (skip header)
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");

    const sku = clean(cols[0]);
    const csvGTIN = clean(cols[1]).replace(/\D/g, ""); // digits only

    if (!sku || !csvGTIN) continue;

    // normalize both to 14 digits
    const normalizedCSV = csvGTIN.slice(-14);
    const normalizedScan = gtin;

    if (normalizedCSV === normalizedScan) {
      return sku;
    }
  }

  return null;
}

// --------------------
// SCAN HANDLER
// --------------------
async function handleScan(value) {
  const gtin = extractGTIN(value);

  if (!gtin) {
    status.textContent = "Invalid barcode";
    status.style.color = "red";
    beep(150);
    input.value = "";
    return;
  }

  status.textContent = "Searching...";
  status.style.color = "white";

  const sku = await findSKU(gtin);

  if (sku) {
    status.textContent = "SKU: " + sku;
    status.style.color = "lime";
    beep(880);

    input.value = "";
  } else {
    status.textContent = "Not found → assign";
    status.style.color = "orange";

    window.location.href =
      "assign.html?gtin=" + encodeURIComponent(gtin);
  }
}

// --------------------
// AUTO SCAN (NO ENTER REQUIRED)
// --------------------
let buffer = "";
let timer;

input.addEventListener("input", (e) => {
  buffer = e.target.value;

  clearTimeout(timer);

  timer = setTimeout(() => {
    if (buffer.length > 0) {
      handleScan(buffer);
      buffer = "";
    }
  }, 80);
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    handleScan(input.value);
    input.value = "";
  }
});

// keep focus
setInterval(() => input.focus(), 500);

</script>

</body>
</html>
