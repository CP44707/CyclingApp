<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Cycle Counter</title>

<style>
  body {
    margin: 0;
    width: 3.75in;
    height: 2.25in;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input {
    width: 90%;
    font-size: 16px;
    padding: 8px;
    margin-top: 4px;
    text-align: center;
  }

  #status {
    margin: 6px;
    font-size: 13px;
    text-align: center;
  }

  table {
    width: 95%;
    font-size: 12px;
    border-collapse: collapse;
  }

  td, th {
    border-bottom: 1px solid #444;
    padding: 4px;
    text-align: center;
  }

  tr:hover {
    background: #222;
  }
</style>
</head>

<body>

<input id="scanInput" autofocus placeholder="Scan barcode..." />
<input id="manualInput" placeholder="Or enter SKU manually" />
<div id="status"></div>

<table>
  <thead>
    <tr>
      <th>SKU</th>
      <th>Lot</th>
      <th>Exp</th>
      <th>Qty</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script src="config.js"></script>

<script>
const input = document.getElementById("scanInput");
const manualInput = document.getElementById("manualInput");
const status = document.getElementById("status");
const tbody = document.getElementById("tbody");

let currentEntry = { gtin: null, lot: null, exp: null, sku: null };
let scannedItems = [];
let skuMap = {};

// --------------------
// BEEP (reuse context)
// --------------------
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq) {
  const o = audioCtx.createOscillator();
  o.frequency.value = freq;
  o.connect(audioCtx.destination);
  o.start();
  setTimeout(() => o.stop(), 100);
}

// --------------------
// CLEAN
// --------------------
function clean(v) {
  return (v || "").toString().replace(/\r/g, "").trim();
}

// --------------------
// PARSE BARCODE
// --------------------
function parseBarcode(raw) {
  let data = clean(raw).replace(/\s+/g, "");

  let result = {
    gtin: null,
    exp: null,
    lot: null
  };

  while (data.length > 0) {

    // --------------------
    // GTIN (01) – fixed 14
    // --------------------
    if (data.startsWith("01") && data.length >= 16) {
      result.gtin = data.substring(2, 16);
      data = data.substring(16);
      continue;
    }

    // --------------------
    // EXP (17) – fixed 6
    // --------------------
    if (data.startsWith("17") && data.length >= 8) {
      result.exp = data.substring(2, 8);
      data = data.substring(8);
      continue;
    }

    // --------------------
    // PROD DATE (11) – skip
    // --------------------
    if (data.startsWith("11") && data.length >= 8) {
      data = data.substring(8);
      continue;
    }

    // --------------------
    // LOT (10) – variable
    // --------------------
    if (data.startsWith("10")) {
      let remainder = data.substring(2);

      // look for next AI (11 or 17 or 01)
      let nextIndex = remainder.search(/(01|11|17)/);

      if (nextIndex === -1) {
        result.lot = remainder;
        data = "";
      } else {
        result.lot = remainder.substring(0, nextIndex);
        data = remainder.substring(nextIndex);
      }

      continue;
    }

    // --------------------
    // UNKNOWN → STOP
    // --------------------
    break;
  }

  return result;
}

// --------------------
// LOAD CSV ONCE
// --------------------
async function loadCSV() {
  const res = await fetch(CONFIG.CSV_URL);
  const text = await res.text();

  text.split("\n").slice(1).forEach(line => {
    const cols = line.split(",");
    const sku = clean(cols[0]);
    const gtin = clean(cols[1]).replace(/\D/g, "").slice(-14);

    if (gtin) skuMap[gtin] = sku;
  });
}

// --------------------
// FIND SKU
// --------------------
function findSKU(gtin) {
  return skuMap[gtin] || null;
}

// --------------------
// TABLE LOGIC
// --------------------
function addToTable(item) {
  const key = `${item.sku}_${item.lot}_${item.exp}`;
  const existing = scannedItems.find(i => i.key === key);

  if (existing) {
    existing.qty++;
  } else {
    scannedItems.push({ key, ...item, qty: 1 });
  }

  renderTable();
}

function renderTable() {
  tbody.innerHTML = "";

  scannedItems.forEach((item, index) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.sku}</td>
      <td>${item.lot}</td>
      <td>${item.exp}</td>
      <td>${item.qty}</td>
    `;

    // EDITABLE ROW
    row.onclick = () => editRow(index);

    tbody.appendChild(row);
  });
}

// --------------------
// EDIT ROW
// --------------------
function editRow(index) {
  const item = scannedItems[index];

  const sku = prompt("Edit SKU", item.sku);
  if (sku === null) return;

  const lot = prompt("Edit Lot", item.lot);
  if (lot === null) return;

  const exp = prompt("Edit Exp", item.exp);
  if (exp === null) return;

  const qty = parseInt(prompt("Edit Qty", item.qty), 10);
  if (isNaN(qty)) return;

  scannedItems[index] = {
    key: `${sku}_${lot}_${exp}`,
    sku, lot, exp, qty
  };

  renderTable();
}

// --------------------
// HELPERS
// --------------------
function resetEntry() {
  currentEntry = { gtin: null, lot: null, exp: null, sku: null };
}

function statusMsg(msg, color="orange") {
  status.textContent = msg;
  status.style.color = color;
}

function success(msg) {
  statusMsg(msg, "lime");
  beep(880);
}

function error(msg) {
  statusMsg(msg, "red");
  beep(150);
}

// --------------------
// HANDLE SCAN
// --------------------
async function handleScan(value) {
  const parsed = parseBarcode(value);

  if (parsed.gtin) currentEntry.gtin = parsed.gtin;
  if (parsed.exp) currentEntry.exp = parsed.exp;
  if (parsed.lot) currentEntry.lot = parsed.lot;

  // ALL 3
  if (currentEntry.gtin && currentEntry.exp && currentEntry.lot) {
    const sku = findSKU(currentEntry.gtin);

    if (sku) {
      addToTable({ sku, lot: currentEntry.lot, exp: currentEntry.exp });
      success("Added");
      resetEntry();
    } else {
      window.location.href = "assign.html?gtin=" + currentEntry.gtin;
    }
    return;
  }

  // GTIN ONLY
  if (currentEntry.gtin && (!currentEntry.exp || !currentEntry.lot)) {
    const sku = findSKU(currentEntry.gtin);

    if (sku) {
      currentEntry.sku = sku;
      statusMsg("Scan lot & exp");
    } else {
      window.location.href = "assign.html?gtin=" + currentEntry.gtin;
    }
    return;
  }

  // LOT + EXP ONLY
  if (!currentEntry.gtin && currentEntry.exp && currentEntry.lot) {
    statusMsg("Enter SKU or scan GTIN");
    return;
  }

  error("Invalid barcode");
}

// --------------------
// AUTO SCAN
// --------------------
let buffer = "";
let timer;

input.addEventListener("input", (e) => {
  buffer = e.target.value;
  clearTimeout(timer);

  timer = setTimeout(() => {
    if (buffer.length > 0) {
      handleScan(buffer);
      buffer = "";
      input.value = "";
    }
  }, 80);
});

// --------------------
// MANUAL SKU ENTRY
// --------------------
manualInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const sku = clean(manualInput.value);

    if (!sku) return;

    if (!currentEntry.lot || !currentEntry.exp) {
      statusMsg("Need lot & exp first");
      return;
    }

    addToTable({
      sku,
      lot: currentEntry.lot,
      exp: currentEntry.exp
    });

    success("Manual add");
    manualInput.value = "";
    resetEntry();
  }
});

// keep focus
setInterval(() => input.focus(), 500);

// init
loadCSV();

</script>

</body>
</html>
