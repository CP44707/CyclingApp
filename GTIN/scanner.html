<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

<title>Scanner</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    width: 3.75in;
    height: 2.25in;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #111;
    color: white;
  }

  #scanInput {
    width: 90%;
    font-size: 18px;
    padding: 10px;
    text-align: center;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
  }

  .error { color: #ff4d4d; }
  .ok { color: #4dff88; }
</style>
</head>

<body>

<input id="scanInput" placeholder="Scan barcode..." autofocus />
<div id="status"></div>

<script src="config.js"></script>
<script>
const input = document.getElementById("scanInput");
const status = document.getElementById("status");

input.focus();

// --- sounds ---
function beepGood() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = 880;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 120);
}

function beepBad() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = 180;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 400);
}

// --- CSV parsing ---
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split("\t");
  return lines.slice(1).map(line => {
    const cols = line.split("\t");
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (cols[i] || "").trim());
    return obj;
  });
}

// --- GTIN extraction ---
function extractGTIN(raw) {
  raw = raw.trim();

  // GS1 format (01) + digits
  const match = raw.match(/\(?01\)?(\d{14,})/);
  if (!match) return null;

  return match[1];
}

// --- main scan handler ---
input.addEventListener("keydown", async (e) => {
  if (e.key !== "Enter") return;

  const raw = input.value;
  input.value = "";

  const gtin = extractGTIN(raw);

  if (!gtin) {
    status.textContent = "Invalid barcode";
    status.className = "error";
    beepBad();
    input.focus();
    return;
  }

  try {
    const res = await fetch(CONFIG.CSV_URL);
    const text = await res.text();
    const data = parseCSV(text);

    const match = data.find(r => r.GTIN === gtin);

    if (match) {
      status.textContent = "SKU: " + match.Item;
      status.className = "ok";
      beepGood();
    } else {
      // redirect to assign
      window.location.href = `assign.html?gtin=${encodeURIComponent(gtin)}`;
    }

  } catch (err) {
    status.textContent = "Fetch error";
    status.className = "error";
    beepBad();
  }

  input.focus();
});
</script>

</body>
</html>
