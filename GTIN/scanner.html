<script src="config.js"></script>
<script>
const input = document.getElementById("scanInput");
const status = document.getElementById("status");

input.focus();

// keep focus always (important for handheld devices)
setInterval(() => input.focus(), 500);

// --- sounds ---
function beepGood() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = 880;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 120);
}

function beepBad() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  o.frequency.value = 180;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 300);
}

// --- CSV parsing (FIXED safer split + trim) ---
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split("\t").map(h => h.trim());

  return lines.slice(1).map(line => {
    const cols = line.split("\t");

    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = (cols[i] || "").trim();
    });

    return obj;
  });
}

// --- GTIN extraction (GS1 AI 01) ---
function extractGTIN(raw) {
  raw = raw.trim();

  const match = raw.match(/\(?01\)?(\d{14,18})/);
  if (!match) return null;

  return match[1];
}

// --- normalize helper (IMPORTANT FIX) ---
function norm(v) {
  return (v || "").toString().trim().replace(/\s+/g, "");
}

// --- main scan handler (NOW AUTO TRIGGERS) ---
async function handleScan(raw) {
  const gtin = extractGTIN(raw);

  if (!gtin) {
    status.textContent = "Invalid barcode";
    status.style.color = "red";
    beepBad();
    return;
  }

  try {
    const res = await fetch(CONFIG.CSV_URL + "&cache=" + Date.now());
    const text = await res.text();
    const data = parseCSV(text);

    // FIX: normalize both sides so mismatches don't happen
    const match = data.find(r => norm(r.GTIN) === norm(gtin));

    if (match) {
      status.textContent = "SKU: " + match.Item;
      status.style.color = "#4dff88";
      beepGood();

      // READY FOR NEXT SCAN IMMEDIATELY
      setTimeout(() => {
        input.value = "";
        input.focus();
      }, 300);

    } else {
      // not found → assign
      window.location.href = `assign.html?gtin=${encodeURIComponent(gtin)}`;
    }

  } catch (err) {
    status.textContent = "Fetch error";
    status.style.color = "red";
    beepBad();
  }
}

/*
=====================================================
FIX: AUTO-DETECT SCANNER INPUT (NO ENTER REQUIRED)
=====================================================
Most handheld scanners send a burst of characters fast.
We detect "typing burst end" instead of waiting for Enter.
*/

let buffer = "";
let timer = null;

input.addEventListener("input", (e) => {
  buffer = e.target.value;

  clearTimeout(timer);

  timer = setTimeout(() => {
    if (buffer.length > 0) {
      handleScan(buffer);
    }
  }, 120); // adjust 80–200ms depending on scanner speed
});

// still support Enter if scanner sends it
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    handleScan(input.value);
  }
});
</script>
