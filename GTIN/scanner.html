<!DOCTYPE html>
<html>
<head>
  <title>Scanner</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial;
      overflow: hidden;
    }

    #banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      color: white;
      text-align: center;
      font-size: 18px;
      padding: 10px;
      display: none;
      z-index: 10;
    }

    #wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 10px;
      box-sizing: border-box;
      padding-top: 50px;
    }

    #scanInput {
      width: 100%;
      font-size: 22px;
      padding: 12px;
      box-sizing: border-box;
    }

    #status {
      font-size: 16px;
      margin-top: 10px;
    }

    #skuBox {
      display: none;
      margin-top: 10px;
      border: 2px solid orange;
      padding: 10px;
      flex: 1;
      overflow: hidden;
    }

    #skuSearch {
      width: 100%;
      font-size: 18px;
      padding: 8px;
      box-sizing: border-box;
    }

    #skuList {
      margin: 10px 0 0 0;
      padding: 0;
      list-style: none;
      overflow: hidden;
    }

    #skuList li {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      font-size: 16px;
    }

    button {
      width: 100%;
      font-size: 18px;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="banner"></div>

<div id="wrap">

  <input id="scanInput" placeholder="Scan barcode..." autocomplete="off">

  <div id="status"></div>

  <div id="skuBox">
    <div><b>Assign SKU</b></div>
    <input id="skuSearch" placeholder="Search SKU...">
    <ul id="skuList"></ul>
  </div>

  <button onclick="goBack()">Back</button>

</div>

<script src="config.js"></script>

<script>
// SOUNDS
const ok = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const bad = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
const warn = new Audio("https://www.soundjay.com/buttons/sounds/button-7.mp3");

// DATA
let map = new Map();
let skuList = [];
let lastGTIN = null;
let inSkuMode = false;

// BUFFER (for scanners that don't send Enter)
let buffer = "";
let lastKeyTime = Date.now();

// --------------------
// LOAD DATA
// --------------------
async function loadData() {
  const res = await fetch(CONFIG.CSV_URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));
  rows.shift();

  map.clear();
  skuList = [];

  rows.forEach(r => {
    const sku = (r[0] || "").trim();
    const gtin = (r[1] || "").trim();

    if (sku) skuList.push(sku);
    if (sku && gtin) map.set(gtin, sku);
  });
}

// --------------------
// GTIN EXTRACT
// --------------------
function extractGTIN(v) {
  const m = v.match(/01(\d{14})/);
  return m ? m[1] : null;
}

// --------------------
// UI HELPERS
// --------------------
function banner(t, c) {
  const b = document.getElementById("banner");
  b.textContent = t;
  b.style.background = c;
  b.style.display = "block";
  setTimeout(() => b.style.display = "none", 1200);
}

function status(t) {
  document.getElementById("status").textContent = t;
}

// --------------------
// MAIN SCAN LOGIC
// --------------------
function processScan(val) {
  if (inSkuMode) return;

  const gtin = extractGTIN(val);

  document.getElementById("skuBox").style.display = "none";

  // ❌ NO GTIN
  if (!gtin) {
    status("No GTIN found");
    bad.play();
    banner("Invalid barcode", "red");
    return;
  }

  // ✅ FOUND
  if (map.has(gtin)) {
    const sku = map.get(gtin);
    status("SKU: " + sku);
    ok.play();
    banner("SKU: " + sku, "green");
    return;
  }

  // ⚠️ UNLINKED
  status("Unlinked GTIN: " + gtin);
  warn.play();
  banner("Assign SKU", "orange");

  lastGTIN = gtin;
  openSkuMode();
}

// --------------------
// SKU MODE
// --------------------
function openSkuMode() {
  inSkuMode = true;

  const box = document.getElementById("skuBox");
  box.style.display = "block";

  renderSku("");
  document.getElementById("skuSearch").focus();
}

function renderSku(f) {
  const list = document.getElementById("skuList");
  list.innerHTML = "";

  skuList
    .filter(s => s.toLowerCase().includes(f.toLowerCase()))
    .slice(0, 10)
    .forEach(sku => {
      const li = document.createElement("li");
      li.textContent = sku;

      li.onclick = () => assign(sku);

      list.appendChild(li);
    });
}

async function assign(sku) {
  await fetch(CONFIG.API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "assignSku",
      item: sku,
      gtin: lastGTIN
    }),
    headers: { "Content-Type": "application/json" }
  });

  map.set(lastGTIN, sku);

  ok.play();
  banner("Saved: " + sku, "blue");
  status("Linked: " + sku);

  inSkuMode = false;
  document.getElementById("skuBox").style.display = "none";

  focusScan();
}

// --------------------
// INPUT HANDLING
// --------------------

// auto scan without Enter (buffer-based)
document.addEventListener("keydown", e => {
  const now = Date.now();

  if (now - lastKeyTime > 100) buffer = "";
  lastKeyTime = now;

  if (inSkuMode) return;

  if (e.key === "Enter") {
    if (buffer.length > 0) {
      processScan(buffer);
      buffer = "";
    }
    return;
  }

  if (e.key.length === 1) {
    buffer += e.key;
  }
});

// SKU search
document.getElementById("skuSearch").addEventListener("input", e => {
  renderSku(e.target.value);
});

// --------------------
// FOCUS CONTROL
// --------------------
function focusScan() {
  if (!inSkuMode) {
    document.getElementById("scanInput").focus();
  }
}

// aggressive focus lock for scanners
setInterval(() => {
  if (!inSkuMode) focusScan();
}, 300);

// --------------------
// BACK
// --------------------
function goBack() {
  window.location.href = "index.html";
}

// INIT
window.onload = loadData;
</script>

</body>
</html>
