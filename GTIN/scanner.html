<!DOCTYPE html>
<html>
<head>
  <title>Scanner</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      height: 100%;
      overflow: hidden;
      background: #f5f5f5;
    }

    #topBar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px;
      text-align: center;
      color: white;
      font-size: 18px;
      display: none;
    }

    #container {
      padding: 60px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #scanInput {
      font-size: 22px;
      padding: 12px;
      width: 100%;
      box-sizing: border-box;
    }

    #result {
      font-size: 18px;
      min-height: 40px;
    }

    #skuPanel {
      display: none;
      border: 2px solid #ff9800;
      padding: 10px;
      background: white;
    }

    #skuSearch {
      width: 100%;
      font-size: 18px;
      padding: 8px;
      box-sizing: border-box;
    }

    #skuList {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
      max-height: 250px;
      overflow-y: auto;
    }

    #skuList li {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    button {
      padding: 12px;
      font-size: 18px;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="topBar"></div>

<div id="container">

  <input id="scanInput" placeholder="Scan barcode..." autocomplete="off">
  <div id="result"></div>

  <div id="skuPanel">
    <div><b>Select SKU for this GTIN</b></div>
    <input id="skuSearch" placeholder="Search SKU...">
    <ul id="skuList"></ul>
  </div>

  <button onclick="goBack()">Back</button>

</div>

<script src="config.js"></script>

<script>
// --------------------
// SOUND
// --------------------
const ok = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const bad = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

// --------------------
// DATA
// --------------------
let map = new Map(); // GTIN -> SKU
let skuList = [];
let currentGTIN = null;

// --------------------
// LOAD SHEET
// --------------------
async function loadData() {
  const res = await fetch(CONFIG.CSV_URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));
  rows.shift();

  map.clear();
  skuList = [];

  rows.forEach(r => {
    const sku = (r[0] || "").trim();
    const gtin = (r[1] || "").trim();

    if (sku) skuList.push(sku);
    if (sku && gtin) map.set(gtin, sku);
  });
}

// --------------------
// GTIN PARSE
// --------------------
function extractGTIN(str) {
  const m = str.match(/01(\d{14})/);
  return m ? m[1] : null;
}

// --------------------
// UI HELPERS
// --------------------
function showBanner(text, color) {
  const bar = document.getElementById("topBar");
  bar.textContent = text;
  bar.style.background = color;
  bar.style.display = "block";

  setTimeout(() => {
    bar.style.display = "none";
  }, 1200);
}

function setResult(text) {
  document.getElementById("result").textContent = text;
}

// --------------------
// MAIN SCAN FLOW
// --------------------
function handleScan(value) {
  const gtin = extractGTIN(value);

  document.getElementById("skuPanel").style.display = "none";

  // ❌ NO GTIN
  if (!gtin) {
    setResult("❌ Invalid barcode");
    bad.play();
    showBanner("ERROR", "red");
    reset();
    return;
  }

  // ✅ FOUND
  if (map.has(gtin)) {
    const sku = map.get(gtin);

    setResult("SKU: " + sku);
    ok.play();
    showBanner("SKU: " + sku, "green");
    reset();
    return;
  }

  // ⚠️ NOT FOUND
  setResult("⚠️ GTIN not found: " + gtin);
  bad.play();
  showBanner("ASSIGN SKU", "orange");

  currentGTIN = gtin;
  openSkuSelector();
}

// --------------------
// SKU SELECTOR
// --------------------
function openSkuSelector() {
  const panel = document.getElementById("skuPanel");
  panel.style.display = "block";

  renderSku("");

  document.getElementById("skuSearch").value = "";
  document.getElementById("skuSearch").focus();
}

function renderSku(filter) {
  const list = document.getElementById("skuList");
  list.innerHTML = "";

  skuList
    .filter(s => s.toLowerCase().includes(filter.toLowerCase()))
    .slice(0, 15)
    .forEach(sku => {
      const li = document.createElement("li");
      li.textContent = sku;
      li.onclick = () => assignSku(sku);
      list.appendChild(li);
    });
}

// --------------------
// ASSIGN SKU
// --------------------
async function assignSku(sku) {
  await fetch(CONFIG.API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "assignSku",
      item: sku,
      gtin: currentGTIN
    }),
    headers: { "Content-Type": "application/json" }
  });

  map.set(currentGTIN, sku);

  ok.play();
  showBanner("Saved: " + sku, "blue");
  setResult("Linked: " + sku);

  reset();
}

// --------------------
// RESET FOR NEXT SCAN
// --------------------
function reset() {
  currentGTIN = null;

  document.getElementById("scanInput").value = "";
  document.getElementById("scanInput").focus();
}

// --------------------
// EVENTS
// --------------------
document.getElementById("scanInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    handleScan(e.target.value.trim());
  }
});

document.getElementById("skuSearch").addEventListener("input", e => {
  renderSku(e.target.value);
});

// KEEP FOCUS SIMPLE
setInterval(() => {
  if (document.activeElement.id !== "skuSearch") {
    document.getElementById("scanInput").focus();
  }
}, 500);

// INIT
window.onload = () => {
  loadData();
  document.getElementById("scanInput").focus();
};

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
