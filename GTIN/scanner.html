<!DOCTYPE html>
<html>
<head>
  <title>Scanner</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      height: 100%;
      overflow: hidden;
    }

    #banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px;
      text-align: center;
      color: white;
      font-size: 18px;
      display: none;
    }

    #wrap {
      padding: 60px 10px 10px;
    }

    #scanInput {
      width: 100%;
      font-size: 22px;
      padding: 12px;
      box-sizing: border-box;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
    }

    button {
      margin-top: 10px;
      width: 100%;
      font-size: 18px;
      padding: 12px;
    }
  </style>
</head>

<body>

<div id="banner"></div>

<div id="wrap">

  <input id="scanInput" placeholder="Scan barcode..." autocomplete="off">
  <div id="result"></div>

  <button onclick="goBack()">Back</button>

</div>

<script src="config.js"></script>

<script>
// --------------------
// SOUND
// --------------------
const ok = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const bad = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

// --------------------
// DATA
// --------------------
let map = new Map(); // GTIN -> SKU

// --------------------
// LOAD SHEET
// --------------------
async function loadData() {
  const res = await fetch(CONFIG.CSV_URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));
  rows.shift();

  map.clear();

  rows.forEach(r => {
    const sku = (r[0] || "").trim();
    const gtin = (r[1] || "").trim();

    if (sku && gtin) {
      map.set(gtin, sku);
    }
  });
}

// --------------------
// GTIN PARSE
// --------------------
function extractGTIN(str) {
  const match = str.match(/01(\d{14})/);
  return match ? match[1] : null;
}

// --------------------
// UI
// --------------------
function banner(text, color) {
  const b = document.getElementById("banner");
  b.textContent = text;
  b.style.background = color;
  b.style.display = "block";

  setTimeout(() => b.style.display = "none", 1200);
}

function setResult(text) {
  document.getElementById("result").textContent = text;
}

// --------------------
// SCAN HANDLER
// --------------------
function handleScan(val) {
  const gtin = extractGTIN(val);

  // ❌ NO GTIN
  if (!gtin) {
    setResult("❌ Invalid barcode");
    bad.play();
    banner("ERROR", "red");
    return;
  }

  // 🟢 FOUND
  if (map.has(gtin)) {
    const sku = map.get(gtin);

    setResult("SKU: " + sku);
    ok.play();
    banner("SKU: " + sku, "green");
    return;
  }

  // 🟡 NOT FOUND → ASSIGN PAGE
  setResult("⚠️ GTIN not found");
  banner("ASSIGN SKU", "orange");

  window.location.href = "assign.html?gtin=" + gtin;
}

// --------------------
// EVENTS
// --------------------
document.getElementById("scanInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    handleScan(e.target.value.trim());
    e.target.value = "";
  }
});

// keep focus
setInterval(() => {
  document.getElementById("scanInput").focus();
}, 400);

// INIT
window.onload = loadData;

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
