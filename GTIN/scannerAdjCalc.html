<!DOCTYPE html>
<html>
<head>
  <title>Scanner Adjustment Wizard</title>

  <script src="config.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: #1f232a;
  color: #e5e7eb;
  padding: 20px;
}

h2 {
  text-align: center;
  font-weight: 700;
  margin-bottom: 20px;
  color: #f3f4f6;
  letter-spacing: 0.3px;
}

h3 {
  margin-top: 10px;
  color: #f3f4f6;
}

button {
  background: #2f3742;
  color: #e5e7eb;
  border: 1px solid #3b4452;
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.15s ease;
}

button:hover {
  background: #3a4452;
  border-color: #4b5563;
}

button:active {
  transform: scale(0.98);
}

input[type="file"] {
  background: #262b33;
  border: 1px solid #3b4452;
  color: #e5e7eb;
  padding: 10px;
  border-radius: 10px;
  box-sizing: border-box;
}

#step1, #step2, #step3, #step4 {
  margin-top: 20px;
  background: #262b33;
  border: 1px solid #3b4452;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

#status {
  color: #cbd5e1;
  margin-top: 10px;
}

#batchOptions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: #262b33;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

th, td {
  border-bottom: 1px solid #343b46;
  padding: 12px;
  text-align: left;
  color: #e5e7eb;
}

th {
  background: #2f3742;
  font-weight: 700;
  color: #f3f4f6;
}

tr:hover td {
  background: #2c3440;
}

.copyBtn {
  margin-left: 6px;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  background: #3a4452;
  color: #e5e7eb;
  border: 1px solid #4b5563;
}

.copyBtn:hover {
  background: #465162;
}
  </style>
</head>

<body>

<h2>Scanner Adjustment Wizard</h2>

<button onclick="startFlow()">Create New Adjustment</button>

<div id="step1" style="display:none;">
  <h3>Loading Google Sheet...</h3>
  <div id="status"></div>
</div>

<div id="step2" style="display:none;">
  <h3>Upload NetSuite XLS/XLSX</h3>
  <input type="file" id="fileInput" accept=".xls,.xlsx">
</div>

<div id="step3" style="display:none;">
  <h3>Select Cycle Batch</h3>
  <div id="batchOptions"></div>
</div>

<div id="step4" style="display:none;">
  <h3>Adjustment Results</h3>

  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Lot</th>
        <th>Expiration</th>
        <th>Bin</th>
        <th>Adjustment</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
</div>

<script>

// =====================
// STATE
// =====================
let cycleData = [];
let netSuiteData = [];
let selectedBin = "";
let selectedDate = "";

// =====================
// HELPERS
// =====================
function clean(v){
  return (v || "").toString().trim().toUpperCase();
}

function num(v){
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

// =====================
// DATE NORMALIZER
// =====================
function normDate(v){

  if (!v) return "";

  const s = v.toString().trim();

  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  if (/^\d{1,2}-\d{1,2}-\d{2}$/.test(s)) {
    const parts = s.split("-");
    return `20${parts[2]}-${parts[1].padStart(2,"0")}-${parts[0].padStart(2,"0")}`;
  }

  if (!isNaN(v) && typeof v === "number") {
    const d = new Date(Date.UTC(1899, 11, 30) + v * 86400000);
    return d.toISOString().split("T")[0];
  }

  const d = new Date(v);
  if (isNaN(d)) return "";
  return d.toISOString().split("T")[0];
}

// =====================
// DISPLAY DATE FORMAT
// =====================
function formatDisplayDate(iso){

  if (!iso) return "";

  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;

  const day = String(d.getDate()).padStart(2,"0");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const mon = months[d.getMonth()];
  const yr = String(d.getFullYear()).slice(-2);

  return `${day}-${mon}-${yr}`;
}

function copyToClipboard(text){
  navigator.clipboard.writeText(text);
}

// =====================
// KEY
// =====================
function key(item, lot, exp, bin){
  return [clean(item), clean(lot), normDate(exp), clean(bin)].join("|");
}

// =====================
// FLOW
// =====================
function startFlow(){
  document.getElementById("step1").style.display = "block";
  loadGoogleSheet();
}

// =====================
// GOOGLE SHEET
// =====================
async function loadGoogleSheet(){

  const res = await fetch(CONFIG.CYCLE_CSV);
  const text = await res.text();

  const parsed = Papa.parse(text.trim(), {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim()
  });

  cycleData = parsed.data;

  document.getElementById("status").innerText = "Google Sheet Loaded ✔";
  document.getElementById("step2").style.display = "block";
}

// =====================
// FILE UPLOAD
// =====================
document.getElementById("fileInput").addEventListener("change", e => {

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt){

    const data = new Uint8Array(evt.target.result);
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

    netSuiteData = json.map(r => ({
      Item: r["Item"],
      Lot: r["LOT"],
      Expiration: r["Expiration Date"],
      Bin: r["Bin Number"],
      OnHand: r["On Hand"]
    }));

    buildBatchOptions();
    document.getElementById("step3").style.display = "block";
  };

  reader.readAsArrayBuffer(file);
});

// =====================
// BATCHES
// =====================
function buildBatchOptions(){

  const map = {};

  cycleData.forEach(r => {
    const bin = clean(r["Bin"]);
    const date = normDate(r["Timestamp"]);
    if (!bin || !date) return;
    map[`${date}|${bin}`] = true;
  });

  const div = document.getElementById("batchOptions");
  div.innerHTML = "";

  Object.keys(map).forEach(k => {

    const [date, bin] = k.split("|");
    const d = new Date(date + "T00:00:00");

    const label = d.toLocaleDateString(undefined,{ month:"long", day:"numeric" });

    const btn = document.createElement("button");
    btn.innerText = `${label}, Bin ${bin}`;

    btn.onclick = () => {
      selectedBin = bin;
      selectedDate = date;
      runCalculation();
    };

    div.appendChild(btn);
  });
}

// =====================
// CORE LOGIC (UPDATED ONLY)
// =====================
function runCalculation(){

  const ledger = {};

  netSuiteData
    .filter(r => clean(r.Bin) === selectedBin)
    .forEach(r => {
      const k = key(r.Item, r.Lot, r.Expiration, r.Bin);
      ledger[k] = (ledger[k] || 0) - num(r.OnHand);
    });

  cycleData
    .filter(r =>
      clean(r["Bin"]) === selectedBin &&
      normDate(r["Timestamp"]) === selectedDate
    )
    .forEach(r => {
      const k = key(r["SKU"], r["Lot"], r["Expiration Date"], r["Bin"]);
      ledger[k] = (ledger[k] || 0) + num(r["On Hand"]);
    });

  let rows = Object.entries(ledger)
    .map(([k,v])=>{
      const [item,lot,exp,bin] = k.split("|");
      return {item,lot,exp,bin,adj:v};
    })
    .filter(r => r.adj !== 0);

  // SORT BY SKU
  rows.sort((a,b)=> a.item.localeCompare(b.item));

  const tbody = document.getElementById("results");
  tbody.innerHTML = "";

  function cell(val){
    const safe = val ?? "";
    return `
      <div style="display:flex;align-items:center;gap:8px;">
        <span>${safe}</span>
        <button class="copyBtn" onclick="copyToClipboard('${String(safe).replace(/'/g,"\\'")}')">
          Copy
        </button>
      </div>`;
  }

  rows.forEach(r=>{
    tbody.innerHTML += `
      <tr>
        <td>${cell(r.item)}</td>
        <td>${cell(r.lot)}</td>
        <td>${cell(formatDisplayDate(r.exp))}</td>
        <td>${cell(r.bin)}</td>
        <td>${cell(r.adj>0?("+"+r.adj):r.adj)}</td>
      </tr>`;
  });

  document.getElementById("step4").style.display = "block";
}

</script>

</body>
</html>
