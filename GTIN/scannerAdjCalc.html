<!DOCTYPE html>
<html>
<head>
  <title>Scanner Adjustment Wizard</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: rgb(0,0,0);
      color: rgb(255,255,255);
      padding: 24px;
    }

    h2 {
      color: rgb(255,224,0);
      margin-bottom: 20px;
    }

    h3 {
      color: rgb(255,224,0);
      margin-bottom: 12px;
    }

    button {
      background: rgb(255,224,0);
      color: rgb(0,0,0);
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 600;
      margin: 6px 6px 6px 0;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      filter: brightness(0.9);
      transform: translateY(-1px);
    }

    input[type="file"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,224,0,0.3);
      color: white;
      padding: 10px;
      border-radius: 8px;
    }

    #step1, #step2, #step3, #step4 {
      margin-top: 20px;
      padding: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,224,0,0.15);
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 10px;
    }

    th {
      background: rgba(255,224,0,0.15);
      color: rgb(255,224,0);
      text-align: left;
      padding: 10px;
      font-size: 14px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid rgba(255,224,0,0.1);
      color: rgba(255,255,255,0.85);
    }

    tr:hover td {
      background: rgba(255,224,0,0.05);
    }

    #status {
      color: rgba(255,255,255,0.7);
      margin-top: 10px;
    }

    #batchOptions button {
      display: inline-block;
    }
  </style>
</head>

<body>

<h2>Scanner Adjustment Wizard</h2>

<button onclick="startFlow()">Create New Adjustment</button>

<div id="step1" style="display:none;">
  <h3>Loading Google Sheet...</h3>
  <div id="status"></div>
</div>

<div id="step2" style="display:none;">
  <h3>Upload NetSuite XLS/XLSX</h3>
  <input type="file" id="fileInput" accept=".xls,.xlsx">
</div>

<div id="step3" style="display:none;">
  <h3>Select Cycle Batch</h3>
  <div id="batchOptions"></div>
</div>

<div id="step4" style="display:none;">
  <h3>Adjustment Results</h3>

  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Lot</th>
        <th>Expiration</th>
        <th>Bin</th>
        <th>Adjustment</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
</div>

<script>

// =====================
// STATE
// =====================
let cycleData = [];
let netSuiteData = [];
let selectedBin = "";
let selectedDate = "";

// =====================
// HELPERS
// =====================
function clean(v){
  return (v || "").toString().trim().toUpperCase();
}

function num(v){
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

// =====================
// DATE NORMALIZER
// =====================
function normDate(v){

  if (!v) return "";

  const s = v.toString().trim();

  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  if (/^\d{1,2}-\d{1,2}-\d{2}$/.test(s)) {
    const parts = s.split("-");
    return `20${parts[2]}-${parts[1].padStart(2,"0")}-${parts[0].padStart(2,"0")}`;
  }

  if (!isNaN(v) && typeof v === "number") {
    const d = new Date(Date.UTC(1899, 11, 30) + v * 86400000);
    return d.toISOString().split("T")[0];
  }

  const d = new Date(v);
  if (isNaN(d)) return "";
  return d.toISOString().split("T")[0];
}

// =====================
// DISPLAY DATE FORMAT
// =====================
function formatDisplayDate(iso){

  if (!iso) return "";

  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;

  const day = String(d.getDate()).padStart(2,"0");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const mon = months[d.getMonth()];
  const yr = String(d.getFullYear()).slice(-2);

  return `${day}-${mon}-${yr}`;
}

function copyToClipboard(text){
  navigator.clipboard.writeText(text);
}

// =====================
// KEY
// =====================
function key(item, lot, exp, bin){
  return [clean(item), clean(lot), normDate(exp), clean(bin)].join("|");
}

// =====================
// FLOW
// =====================
function startFlow(){
  document.getElementById("step1").style.display = "block";
  loadGoogleSheet();
}

// =====================
// GOOGLE SHEET
// =====================
async function loadGoogleSheet(){

  const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9buyeY2V9qHg10FJJ3JbuyV-o8xvbF2QEGSLgX-3cIdgwR7fDJoY_BLiiAOQYCUHv0qcQ3fMLVDv-/pub?output=csv");
  const text = await res.text();

  const parsed = Papa.parse(text.trim(), {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim()
  });

  cycleData = parsed.data;

  document.getElementById("status").innerText = "Google Sheet Loaded ✔";
  document.getElementById("step2").style.display = "block";
}

// =====================
// FILE UPLOAD
// =====================
document.getElementById("fileInput").addEventListener("change", e => {

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt){

    const data = new Uint8Array(evt.target.result);
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

    netSuiteData = json.map(r => ({
      Item: r["Item"],
      Lot: r["LOT"],
      Expiration: r["Expiration Date"],
      Bin: r["Bin Number"],
      OnHand: r["On Hand"]
    }));

    buildBatchOptions();
    document.getElementById("step3").style.display = "block";
  };

  reader.readAsArrayBuffer(file);
});

// =====================
// BATCHES
// =====================
function buildBatchOptions(){

  const map = {};

  cycleData.forEach(r => {
    const bin = clean(r["Bin"]);
    const date = normDate(r["Timestamp"]);
    if (!bin || !date) return;
    map[`${date}|${bin}`] = true;
  });

  const div = document.getElementById("batchOptions");
  div.innerHTML = "";

  Object.keys(map).forEach(k => {

    const [date, bin] = k.split("|");
    const d = new Date(date + "T00:00:00");

    const label = d.toLocaleDateString(undefined,{ month:"long", day:"numeric" });

    const btn = document.createElement("button");
    btn.innerText = `${label}, Bin ${bin}`;

    btn.onclick = () => {
      selectedBin = bin;
      selectedDate = date;
      runCalculation();
    };

    div.appendChild(btn);
  });
}

// =====================
// CORE LOGIC (UPDATED ONLY)
// =====================
function runCalculation(){

  const ledger = {};

  netSuiteData
    .filter(r => clean(r.Bin) === selectedBin)
    .forEach(r => {
      const k = key(r.Item, r.Lot, r.Expiration, r.Bin);
      ledger[k] = (ledger[k] || 0) - num(r.OnHand);
    });

  cycleData
    .filter(r =>
      clean(r["Bin"]) === selectedBin &&
      normDate(r["Timestamp"]) === selectedDate
    )
    .forEach(r => {
      const k = key(r["SKU"], r["Lot"], r["Expiration Date"], r["Bin"]);
      ledger[k] = (ledger[k] || 0) + num(r["On Hand"]);
    });

  let rows = Object.entries(ledger)
    .map(([k,v])=>{
      const [item,lot,exp,bin] = k.split("|");
      return {item,lot,exp,bin,adj:v};
    })
    .filter(r => r.adj !== 0);

  // SORT BY SKU
  rows.sort((a,b)=> a.item.localeCompare(b.item));

  const tbody = document.getElementById("results");
  tbody.innerHTML = "";

  function cell(val){
    const safe = val ?? "";
    return `
      <div style="display:flex;align-items:center;gap:8px;">
        <span>${safe}</span>
        <button onclick="copyToClipboard('${String(safe).replace(/'/g,"\\'")}')"
          style="padding:4px 8px;border-radius:6px;font-size:12px;">
          Copy
        </button>
      </div>`;
  }

  rows.forEach(r=>{
    tbody.innerHTML += `
      <tr>
        <td>${cell(r.item)}</td>
        <td>${cell(r.lot)}</td>
        <td>${cell(formatDisplayDate(r.exp))}</td>
        <td>${cell(r.bin)}</td>
        <td>${cell(r.adj>0?("+"+r.adj):r.adj)}</td>
      </tr>`;
  });

  document.getElementById("step4").style.display = "block";
}

</script>

</body>
</html>
