<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fulfillment Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="config.js"></script>

<style>
body {
  margin: 0;
  width: 3.75in;
  min-height: 2.25in;
  background: #111;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 12px;
}

h2 {
  font-size: 20px;
  margin: 10px 0 6px 0;
}

input, button {
  width: 90%;
  font-size: 16px;
  padding: 8px;
  margin-top: 6px;
  text-align: center;
  box-sizing: border-box;
}

button {
  background: #333;
  color: white;
  border: none;
}

button:hover {
  background: #444;
}

#receiptList {
  width: 90%;
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
}

#detail {
  width: 90%;
  margin-top: 10px;
}

#title {
  text-align: center;
  font-size: 14px;
  margin-bottom: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  border: 1px solid #444;
  padding: 6px;
  text-align: center;
}

th {
  background: #333;
  color: white;
}

.copyBtn {
  padding: 2px 6px;
  font-size: 10px;
  border-radius: 4px;
  width: auto;
  margin: 0;
}

.hidden {
  display: none;
}

#status {
  font-size: 12px;
  margin-top: 6px;
  color: orange;
}
</style>
</head>

<body>

<h2>Fulfillment History</h2>

<input
  id="searchInput"
  placeholder="Search SO Number"
/>

<div id="status">Loading...</div>

<div id="receiptList"></div>

<div id="detail" class="hidden">
  <h3 id="title"></h3>

  <table>
    <thead>
      <tr>
        <th>SKU</th>
        <th>Lot</th>
        <th>Expiration</th>
        <th>Qty</th>
      </tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>

<script>

// ----------------------
// CSV SOURCE
// ----------------------
const SHEET_CSV_URL = CONFIG.PICK_CSV;

let rawData = [];
let receipts = [];

// ----------------------
// ELEMENTS
// ----------------------
const receiptList = document.getElementById("receiptList");
const searchInput = document.getElementById("searchInput");
const status = document.getElementById("status");

// ----------------------
// COPY
// ----------------------
function copy(v) {
  navigator.clipboard.writeText(v || "");
}

// ----------------------
// RECEIPT TIME FORMAT
// ----------------------
function formatReceiptTime(dateStr) {

  const d = new Date(dateStr);

  if (isNaN(d)) return dateStr;

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  const month = months[d.getMonth()];
  const day = d.getDate();

  let hour = d.getHours();

  const min = String(d.getMinutes()).padStart(2,"0");

  const ampm = hour >= 12 ? "pm" : "am";

  hour = hour % 12 || 12;

  return `${month} ${day}, ${hour}:${min}${ampm}`;
}

// ----------------------
// EXPIRATION FORMAT
// ----------------------
function formatExpiry(dateStr) {

  if (!dateStr) return "";

  const [year, month, day] = dateStr.split("-");

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  return `${day}-${months[Number(month) - 1]}-${year.slice(-2)}`;
}

// ----------------------
// ROUND TO 1 MIN WINDOW
// ----------------------
function roundMinute(dateStr) {

  const d = new Date(dateStr);

  if (isNaN(d)) return dateStr;

  d.setSeconds(0, 0);

  return d.toISOString();
}

// ----------------------
// LOAD CSV
// ----------------------
async function load() {

  status.textContent = "Loading...";

  const url =
    SHEET_CSV_URL +
    (SHEET_CSV_URL.includes("?") ? "&" : "?") +
    "t=" +
    Date.now();

  const res = await fetch(url, {
    cache: "no-store"
  });

  const text = await res.text();

  const parsed = Papa.parse(text, {
    header: true,
    skipEmptyLines: true
  });

  rawData = parsed.data;

  buildReceipts();

  status.textContent = "";
}

load();

// ----------------------
// GROUP RECEIPTS
// ----------------------
function buildReceipts() {

  const map = {};

  rawData.forEach(r => {

    const so = (r.SO || "").trim();

    const ts = roundMinute(r.Timestamp);

    if (!so || !ts) return;

    const key = so + "|" + ts;

    if (!map[key]) {

      map[key] = {
        so,
        timestamp: ts,
        rows: []
      };
    }

    map[key].rows.push(r);
  });

  receipts = Object.values(map)
    .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

  renderButtons();
}

// ----------------------
// SEARCH
// ----------------------
searchInput.addEventListener("input", renderButtons);

// ----------------------
// RECEIPT BUTTONS
// ----------------------
function renderButtons() {

  receiptList.innerHTML = "";

  const search = searchInput.value.trim().toLowerCase();

  const filtered = receipts.filter(r =>
    r.so.toLowerCase().includes(search)
  );

  filtered.slice(0, 25).forEach(r => {

    const label =
      `${r.so} — ${formatReceiptTime(r.timestamp)}`;

    const btn = document.createElement("button");

    btn.innerText = label;

    btn.onclick = () => openReceipt(r);

    receiptList.appendChild(btn);
  });

  if (!filtered.length) {
    receiptList.innerHTML =
      `<div style="text-align:center;font-size:12px;color:orange;">
        No Results
      </div>`;
  }
}

// ----------------------
// COPY CELL
// ----------------------
function cell(val) {

  const safe = val ?? "";

  return `
    <div style="display:flex;justify-content:center;align-items:center;gap:4px;">
      <span>${safe}</span>
      <button
        class="copyBtn"
        onclick="copy('${String(safe).replace(/'/g,"\\'")}')"
      >
        Copy
      </button>
    </div>
  `;
}

// ----------------------
// OPEN RECEIPT
// ----------------------
function openReceipt(r) {

  document.getElementById("detail")
    .classList.remove("hidden");

  document.getElementById("title").innerText =
    `${r.so} — ${formatReceiptTime(r.timestamp)}`;

  const body = document.getElementById("body");

  body.innerHTML = "";

  r.rows.forEach(x => {

    body.innerHTML += `
      <tr>
        <td>${cell(x.SKU)}</td>
        <td>${cell(x.Lot)}</td>
        <td>${cell(formatExpiry(x["Expiration Date"]))}</td>
        <td>${cell(x["Picked Qty"])}</td>
      </tr>
    `;
  });
}

</script>

</body>
</html>
