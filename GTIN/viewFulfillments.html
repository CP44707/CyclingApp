<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fulfillment Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="config.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: #1f232a;
  color: #e5e7eb;
  padding: 20px;
}

h2 {
  text-align: center;
  font-weight: 700;
  margin-bottom: 20px;
  color: #f3f4f6;
  letter-spacing: 0.3px;
}

h3 {
  margin-top: 10px;
  color: #f3f4f6;
}

button {
  background: #2f3742;
  color: #e5e7eb;
  border: 1px solid #3b4452;
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.15s ease;
}

button:hover {
  background: #3a4452;
  border-color: #4b5563;
}

button:active {
  transform: scale(0.98);
}

#searchBox {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 14px;
  border-radius: 10px;
  border: 1px solid #3b4452;
  font-size: 15px;
  outline: none;
  background: #262b33;
  color: #e5e7eb;
  box-sizing: border-box;
}

#searchBox:focus {
  border-color: #5b6b82;
  box-shadow: 0 0 0 3px rgba(91,107,130,0.25);
}

#receiptList {
  display: flex;
  flex-direction: column;
  gap: 8px;

  height: 350px;
  overflow-y: auto;

  background: #262b33;
  border: 1px solid #3b4452;
  border-radius: 12px;

  padding: 12px;
  margin-bottom: 20px;

  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: #262b33;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

th, td {
  border-bottom: 1px solid #343b46;
  padding: 12px;
  text-align: center;
  color: #e5e7eb;
}

th {
  background: #2f3742;
  font-weight: 700;
  color: #f3f4f6;
}

tr:hover td {
  background: #2c3440;
}

.copyBtn {
  margin-left: 6px;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  background: #3a4452;
  color: #e5e7eb;
  border: 1px solid #4b5563;
}

.copyBtn:hover {
  background: #465162;
}

.hidden {
  display: none;
}

#status {
  color: #cbd5e1;
  margin-bottom: 12px;
}

/* subtle checkbox accent */
input[type="checkbox"] {
  transform: scale(1.1);
  accent-color: #60a5fa;
}
</style>
</head>

<body>

<h2>Fulfillment History</h2>

<input
  type="text"
  id="searchBox"
  placeholder="Search SO..."
  oninput="renderButtons()"
/>

<div id="status">Loading...</div>

<div id="receiptList"></div>

<div id="detail" class="hidden">
  <h3 id="title"></h3>

  <table>
    <thead>
      <tr>
        <th>SKU</th>
        <th>Lot</th>
        <th>Expiration</th>
        <th>Qty</th>
        <th>Done</th>
      </tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>

<script>

// ----------------------
// CSV SOURCE
// ----------------------
const SHEET_CSV_URL = CONFIG.PICK_CSV;

let rawData = [];
let receipts = [];

// ----------------------
// COPY
// ----------------------
function copy(v) {
  navigator.clipboard.writeText(v || "");
}

// ----------------------
// RECEIPT TIME FORMAT
// ----------------------
function formatReceiptTime(dateStr) {

  const d = new Date(dateStr);

  if (isNaN(d)) return dateStr;

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  const month = months[d.getMonth()];
  const day = d.getDate();

  let hour = d.getHours();

  const min = String(d.getMinutes()).padStart(2,"0");

  const ampm = hour >= 12 ? "pm" : "am";

  hour = hour % 12 || 12;

  return `${month} ${day}, ${hour}:${min}${ampm}`;
}

// ----------------------
// EXPIRATION FORMAT
// ----------------------
function formatExpiry(dateStr) {

  if (!dateStr) return "";

  const [year, month, day] = dateStr.split("-");

  if (!year || !month || !day) return dateStr;

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  return `${day.padStart(2,"0")}-${months[Number(month) - 1]}-${year.slice(-2)}`;
}

// ----------------------
// ROUND TO 1 MIN WINDOW
// ----------------------
function roundMinute(dateStr) {

  const d = new Date(dateStr);

  if (isNaN(d)) return dateStr;

  d.setSeconds(0, 0);

  return d.toISOString();
}

// ----------------------
// LOAD CSV
// ----------------------
async function load() {

  const url =
    SHEET_CSV_URL +
    (SHEET_CSV_URL.includes("?") ? "&" : "?") +
    "t=" +
    Date.now();

  const res = await fetch(url, {
    cache: "no-store"
  });

  const text = await res.text();

  const parsed = Papa.parse(text, {
    header: true,
    skipEmptyLines: true
  });

  rawData = parsed.data;

  buildReceipts();

  document.getElementById("status").innerText = "";
}

load();

// ----------------------
// GROUP RECEIPTS
// ----------------------
function buildReceipts() {

  const map = {};

  rawData.forEach(r => {

    const so = (r.SO || "").trim();
    const ts = roundMinute(r.Timestamp);

    if (!so || !ts) return;

    const key = so + "|" + ts;

    if (!map[key]) {

      map[key] = {
        so,
        timestamp: ts,
        rows: []
      };
    }

    map[key].rows.push(r);
  });

  receipts = Object.values(map)
    .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

  renderButtons();
}

// ----------------------
// RECEIPT BUTTONS
// ----------------------
function renderButtons() {

  const div = document.getElementById("receiptList");

  div.innerHTML = "";

  const search =
    (document.getElementById("searchBox")?.value || "")
      .toLowerCase()
      .trim();

  receipts
    .filter(r =>
      r.so.toLowerCase().includes(search)
    )
    .slice(0, 25)
    .forEach(r => {

      const label =
        `${r.so} — ${formatReceiptTime(r.timestamp)}`;

      const btn = document.createElement("button");

      btn.innerText = label;

      btn.onclick = () => openReceipt(r);

      div.appendChild(btn);
    });

  if (!div.innerHTML.trim()) {

    div.innerHTML = `
      <div style="
        text-align:center;
        color:#cbd5e1;
        padding:20px;
      ">
        No Results
      </div>
    `;
  }
}

// ----------------------
// COPY CELL
// ----------------------
function cell(val) {

  const safe = val ?? "";

  return `
    <div style="display:flex;justify-content:center;align-items:center;gap:6px;">
      <span>${safe}</span>
      <button class="copyBtn" onclick="copy('${String(safe).replace(/'/g,"\\'")}')">
        Copy
      </button>
    </div>
  `;
}

// ----------------------
// OPEN RECEIPT
// ----------------------
// ----------------------
// OPEN RECEIPT
// ----------------------
function openReceipt(r) {

  document.getElementById("detail")
    .classList.remove("hidden");

  document.getElementById("title").innerText =
    `${r.so} — ${formatReceiptTime(r.timestamp)}`;

  const body = document.getElementById("body");

  body.innerHTML = "";

  r.rows.forEach((x, i) => {

    const rowId = `row_${i}`;

    body.innerHTML += `
      <tr id="${rowId}">
        
        <td>${cell(x.SKU)}</td>
        <td>${cell(x.Lot)}</td>
        <td>${cell(formatExpiry(x["Expiration Date"]))}</td>
        <td>${cell(x["Picked Qty"])}</td>

        <td>
          <input
            type="checkbox"
            onchange="
              const row = document.getElementById('${rowId}');
              row.style.background = this.checked
                ? 'rgba(96,165,250,0.15)'
                : '';
            "
          >
        </td>

      </tr>
    `;
  });
}
</script>

</body>
</html>
