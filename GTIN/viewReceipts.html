<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Receiving Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="config.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: rgb(0,0,0);
  color: rgb(255,224,0);
  padding: 20px;
}

h2 {
  text-align: center;
}

button {
  background: rgb(255,224,0);
  color: black;
  border: none;
  padding: 12px 14px;
  margin: 6px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  filter: brightness(0.9);
}

#receiptList {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid rgb(255,224,0);
  padding: 10px;
  text-align: center;
}

th {
  background: rgb(255,224,0);
  color: black;
}

.copyBtn {
  margin-left: 6px;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h2>Receiving History</h2>

<input
  type="text"
  id="searchBox"
  placeholder="Search PO..."
  style="
    width:100%;
    padding:12px;
    margin-bottom:14px;
    border-radius:8px;
    border:none;
    font-size:16px;
    box-sizing:border-box;
  "
  oninput="renderButtons()"
/>

<div id="receiptList"></div>

<div id="detail" class="hidden">
  <h3 id="title"></h3>

  <table>
    <thead>
      <tr>
        <th>SKU</th>
        <th>Lot</th>
        <th>Expiration</th>
        <th>Qty</th>
      </tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>

<script>

// ----------------------
// CSV SOURCE (UNCHANGED)
// ----------------------
const SHEET_CSV_URL = CONFIG.RECEIVE_CSV;

let rawData = [];
let receipts = [];

// ----------------------
// COPY
// ----------------------
function copy(v) {
  navigator.clipboard.writeText(v || "");
}

// ----------------------
// RECEIPT TIME FORMAT
// ----------------------
function formatReceiptTime(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const month = months[d.getMonth()];
  const day = d.getDate();

  let hour = d.getHours();
  const min = String(d.getMinutes()).padStart(2,"0");

  const ampm = hour >= 12 ? "pm" : "am";
  hour = hour % 12 || 12;

  return `${month} ${day}, ${hour}:${min}${ampm}`;
}

// ----------------------
// EXPIRATION FORMAT
// ----------------------
function formatExpiry(dateStr) {

  if (!dateStr) return "";

  // expected format: YYYY-MM-DD
  const [year, month, day] = dateStr.split("-");

  if (!year || !month || !day) return dateStr;

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  return `${day.padStart(2,"0")}-${months[Number(month) - 1]}-${year.slice(-2)}`;
}

// ----------------------
// ROUND TO 1 MIN WINDOW
// ----------------------
function roundMinute(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;

  d.setSeconds(0, 0);
  return d.toISOString();
}

// ----------------------
// LOAD CSV (🔥 FIXED CACHE ISSUE)
// ----------------------
async function load() {

  const url =
    SHEET_CSV_URL +
    (SHEET_CSV_URL.includes("?") ? "&" : "?") +
    "t=" +
    Date.now();

  const res = await fetch(url, {
    cache: "no-store"
  });

  const text = await res.text();

  const parsed = Papa.parse(text, {
    header: true,
    skipEmptyLines: true
  });

  rawData = parsed.data;

  buildReceipts();
}

load();

// ----------------------
// GROUP RECEIPTS
// ----------------------
// ----------------------
// GROUP RECEIPTS
// ----------------------
function buildReceipts() {

  const grouped = {};

  // First group by PO
  rawData.forEach(r => {

    const po = (r.PO || "").trim();
    const ts = new Date(r.Timestamp);

    if (!po || isNaN(ts)) return;

    if (!grouped[po]) grouped[po] = [];

    grouped[po].push({
      raw: r,
      time: ts
    });
  });

  const result = [];

  // For each PO, sort by timestamp and group within 10 mins
  Object.keys(grouped).forEach(po => {

    const rows = grouped[po]
      .sort((a, b) => a.time - b.time);

    let current = null;

    rows.forEach(item => {

      if (!current) {
        current = {
          po,
          timestamp: item.time.toISOString(),
          rows: [item.raw],
          lastTime: item.time
        };

        return;
      }

      const diffMinutes =
        (item.time - current.lastTime) / 1000 / 60;

      // same group if within 10 mins
      if (diffMinutes <= 10) {

        current.rows.push(item.raw);
        current.lastTime = item.time;

      } else {

        result.push(current);

        current = {
          po,
          timestamp: item.time.toISOString(),
          rows: [item.raw],
          lastTime: item.time
        };
      }
    });

    if (current) {
      result.push(current);
    }
  });

  receipts = result
    .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))
    .slice(0, 10);

  renderButtons();
}

// ----------------------
// RECEIPT BUTTONS
// ----------------------
function renderButtons() {

  const div = document.getElementById("receiptList");
  div.innerHTML = "";

  const search =
    (document.getElementById("searchBox")?.value || "")
      .toLowerCase()
      .trim();

  receipts
    .filter(r =>
      r.po.toLowerCase().includes(search)
    )
    .forEach(r => {

      const label = `${r.po} — ${formatReceiptTime(r.timestamp)}`;

      const btn = document.createElement("button");
      btn.innerText = label;
      btn.onclick = () => openReceipt(r);

      div.appendChild(btn);
    });
}

// ----------------------
// COPY CELL
// ----------------------
function cell(val) {
  const safe = val ?? "";

  return `
    <div style="display:flex;justify-content:center;align-items:center;gap:6px;">
      <span>${safe}</span>
      <button class="copyBtn" onclick="copy('${String(safe).replace(/'/g,"\\'")}')">Copy</button>
    </div>
  `;
}

// ----------------------
// OPEN RECEIPT
// ----------------------
// ----------------------
// OPEN RECEIPT
// ----------------------
function openReceipt(r) {

  document.getElementById("detail").classList.remove("hidden");

  document.getElementById("title").innerText =
    `${r.po} — ${formatReceiptTime(r.timestamp)}`;

  const body = document.getElementById("body");
  body.innerHTML = "";

  r.rows.forEach((x, i) => {

    const rowId = `row_${i}`;

    body.innerHTML += `
      <tr id="${rowId}">
        
        <td>${cell(x.SKU)}</td>
        <td>${cell(x.Lot)}</td>
        <td>${cell(formatExpiry(x["Expiration Date"]))}</td>
        <td>${cell(x["Received Qty"])}</td>
        <td>
          <input
            type="checkbox"
            onchange="
              const row = document.getElementById('${rowId}');
              row.style.background = this.checked
                ? 'rgba(255,224,0,0.15)'
                : '';
            "
          >
        </td>
      </tr>
    `;
  });
}

</script>

</body>
</html>
